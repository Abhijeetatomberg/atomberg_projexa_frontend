function delReview(id){const r=reviews.find(x=>x.id===id);if(!r)return;
 if(!confirm('Delete the review dated '+fmtNice(new Date(r.date))+'? This removes its project notes from the MOM Matrix. Linked action items are kept (just unlinked from this review), not deleted.'))return;
 reviews=reviews.filter(x=>x.id!==id);
 momActions.forEach(a=>{if(a.reviewId===id)a.reviewId=null;});
 if(reviewOpenId===id)reviewOpenId=null;
 saveState();toast('Review deleted','success');render();}
function reviewEditor(id){const r=reviews.find(x=>x.id===id);if(!r){reviewOpenId=null;return viewReviews();}
 const cards=reviewProjectList().map(p=>{const acts=momActions.filter(a=>a.reviewId===id&&a.proj===p.name);
   const prev=prevReviewNote(id,p.name);
   const badge=isPoc(p)?'<span class="badge bg-purple">POC · '+POC_STAGE_LABELS[p.stage]+'</span>':'<span class="badge bg-blue">'+GATE_LABELS[p.gate]+'</span>';
   const prevBlk=prev?'<div class="rev-prev"><div class="rev-prevh">↩ Last review · '+fmtNice(new Date(prev.date))+'</div><div class="rev-prevn">'+esc(prev.notes[p.name]).replace(/\n/g,'<br>')+'</div></div>':'';
   const aRows=acts.map(a=>'<div class="ra"><span class="ra-t">'+esc(a.text)+'</span><span class="ra-o">'+esc(a.owner||'—')+(a.due?' · '+fmtNice(new Date(a.due)):'')+'</span>'+actionBadge(a.status)+'<span style="color:var(--red);cursor:pointer;margin-left:6px" onclick="delAction('+a.id+')">✕</span></div>').join('');
   return '<div class="card" style="margin-bottom:12px"><div class="card-h"><div class="ct">'+esc(p.name)+'</div>'+badge+'</div><div class="card-b">'
    +'<div class="rev-auto">'+reviewAutodraft(p)+'</div>'
    +prevBlk
    +'<label class="rev-lbl">This week’s remarks</label><textarea class="rev-ta" placeholder="Discussion / decisions for '+esc(p.name)+'…" onchange="setReviewNote('+id+',this.value,\''+esc(p.name).replace(/'/g,"\\'")+'\')">'+esc((r.notes&&r.notes[p.name])||'')+'</textarea>'
    +'<div class="rev-acts">'+(aRows||'<span class="mut" style="font-size:11.5px">No action items raised</span>')+'</div>'
    +'<button class="btn b-gho b-sm" onclick="addAction(\''+esc(p.name).replace(/'/g,"\\'")+'\','+id+')">'+svg(I.plus)+'Add Action</button>'
   +'</div></div>';
 }).join('');
 return ''
 +'<div class="phead"><div><h1><span class="lnk" onclick="reviewOpenId=null;render()">Weekly Review</span> › Minutes</h1><div class="sub">Project-by-project review</div></div>'
   +'<div class="acts"><button class="btn b-gho" onclick="reviewOpenId=null;render()">← Back</button><button class="btn b-gho" onclick="printReview('+id+')">'+svg(I.export)+'Print / PDF</button><button class="btn b-gho" onclick="emailReview('+id+')">✉ Email MOM</button>'+(isAdmin()?'<button class="btn b-gho" style="color:var(--red);border-color:var(--red)" onclick="delReview('+id+')">Delete Review</button>':'')+'</div></div>'
 +'<div class="card" style="margin-bottom:14px"><div class="card-b" style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end">'
   +'<div class="fl" style="margin:0"><label>Meeting date</label><input type="date" value="'+r.date+'" onchange="setReviewMeta('+id+',\'date\',this.value)"></div>'
   +'<div class="fl" style="margin:0;flex:1;min-width:240px"><label>Attendees</label><input value="'+esc(r.attendees||'')+'" placeholder="Names, comma separated" onchange="setReviewMeta('+id+',\'attendees\',this.value)"></div>'
 +'</div></div>'
 +cards;
}
function setReviewMeta(id,f,v){const r=reviews.find(x=>x.id===id);if(r){r[f]=v;saveState();if(f==='date')render();}}
function setReviewNote(id,v,proj){const r=reviews.find(x=>x.id===id);if(r){if(!r.notes)r.notes={};r.notes[proj]=v;saveState();}}
function addAction(proj,reviewId){
 modal('<div class="modal-h"><div class="mt">'+svg(I.check)+'Add Action Item</div><div class="mx" onclick="closeModal()">×</div></div><div class="modal-b">'
 +(proj?'':'<div class="fl"><label>Project</label><select id="ac-proj">'+npds.map(n=>'<option>'+esc(n.name)+'</option>').join('')+'</select></div>')
 +'<div class="fl"><label>Action</label><input id="ac-text" placeholder="What needs to be done"></div>'
 +'<div class="fg2"><div class="fl"><label>Owner</label><select id="ac-owner">'+ownerOpts('')+'</select></div><div class="fl"><label>Due date</label><input type="date" id="ac-due"></div></div>'
 +'<div class="fl"><label>Status</label><select id="ac-st">'+ACTION_ST.map(o=>'<option>'+o+'</option>').join('')+'</select></div>'
 +'</div><div class="modal-f"><button class="btn b-gho" onclick="closeModal()">Cancel</button><button class="btn b-pri" onclick="saveAction(\''+esc(proj||'').replace(/'/g,"\\'")+'\','+(reviewId||'null')+')">Add</button></div>');
}
function saveAction(proj,reviewId){const text=$('ac-text').value.trim();if(!text){toast('Action text required');return;}
 const pr=proj||($('ac-proj')&&$('ac-proj').value)||'';
 const owner=$('ac-owner').value.trim();
 momActions.push({id:actionCtr++,proj:pr,text,owner,due:$('ac-due').value,status:$('ac-st').value,raisedOn:new Date().toISOString().slice(0,10),reviewId:reviewId||null});
 if(owner)notifyAssigned(owner,text,'Weekly Review — Action Item',pr,$('ac-due').value);
 saveState();closeModal();toast('Action added','success');render();}
function setActionField(id,f,v){const a=momActions.find(x=>x.id===id);if(!a)return;
 if(f==='owner'&&v&&v!==a.owner)notifyAssigned(v,a.text,'Weekly Review — Action Item',a.proj,a.due);
 a[f]=v;if(f==='status'&&v==='Done')a.closedOn=new Date().toISOString().slice(0,10);saveState();render();}
function toggleAction(id){const a=momActions.find(x=>x.id===id);if(!a)return;a.status=a.status==='Done'?'Open':'Done';if(a.status==='Done')a.closedOn=new Date().toISOString().slice(0,10);saveState();render();}
function delAction(id){if(!confirm('Delete this action item?'))return;momActions=momActions.filter(x=>x.id!==id);saveState();render();}
function printReview(id){const r=reviews.find(x=>x.id===id);if(!r)return;
 let h='<h1>Weekly Review — '+fmtNice(new Date(r.date))+'</h1><p><b>Attendees:</b> '+esc(r.attendees||'—')+'</p>';
 npds.forEach(p=>{const note=(r.notes&&r.notes[p.name])||'';const acts=momActions.filter(a=>a.reviewId===id&&a.proj===p.name);if(!note&&!acts.length)return;
   h+='<h2>'+esc(p.name)+' <span style="font-weight:400;font-size:13px">('+GATE_LABELS[p.gate]+')</span></h2>';
   if(note)h+='<p>'+esc(note).replace(/\n/g,'<br>')+'</p>';
   if(acts.length){h+='<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;width:100%;font-size:13px"><tr style="background:#eee"><th align="left">Action</th><th>Owner</th><th>Due</th><th>Status</th></tr>'+acts.map(a=>'<tr><td>'+esc(a.text)+'</td><td align="center">'+esc(a.owner||'-')+'</td><td align="center">'+(a.due?fmtNice(new Date(a.due)):'-')+'</td><td align="center">'+a.status+'</td></tr>').join('')+'</table>';}
 });
 const w=window.open('','_blank');if(!w){toast('Allow pop-ups to print');return;}
 w.document.write('<html><head><title>Weekly Review '+r.date+'</title><style>body{font-family:Arial,sans-serif;max-width:800px;margin:30px auto;color:#111;padding:0 20px}h1{font-size:22px}h2{font-size:16px;margin-top:22px;border-bottom:2px solid #FFC627;padding-bottom:4px}table{margin:8px 0 16px}</style></head><body>'+h+'</body></html>');
 w.document.close();setTimeout(function(){w.print();},250);}
function emailReview(id){const r=reviews.find(x=>x.id===id);if(!r)return;
 let body='Weekly Review — '+fmtNice(new Date(r.date))+'\nAttendees: '+(r.attendees||'-')+'\n';
 npds.forEach(p=>{const note=(r.notes&&r.notes[p.name])||'';const acts=momActions.filter(a=>a.reviewId===id&&a.proj===p.name);if(!note&&!acts.length)return;
   body+='\n== '+p.name+' ('+GATE_LABELS[p.gate]+') ==\n';if(note)body+=note+'\n';acts.forEach(a=>{body+='  [ ] '+a.text+' — '+(a.owner||'-')+(a.due?' (due '+a.due+')':'')+' ['+a.status+']\n';});});
 const mail='mailto:?subject='+encodeURIComponent('Weekly Review MOM — '+r.date)+'&body='+encodeURIComponent(body);
 window.location.href=mail;}
function npdReviewTab(n){
 const acts=momActions.filter(a=>a.proj===n.name);const open=acts.filter(a=>a.status!=='Done');
 const aRows=acts.slice().sort((a,b)=>(a.status==='Done')-(b.status==='Done')).map(a=>'<tr'+(a.status==='Done'?' style="opacity:.6"':'')+'><td><input type="checkbox" '+(a.status==='Done'?'checked':'')+' onchange="toggleAction('+a.id+')" style="width:16px;height:16px;cursor:pointer"></td><td style="white-space:normal;min-width:220px">'+esc(a.text)+'</td><td>'+esc(a.owner||'—')+'</td><td style="white-space:nowrap'+(actOverdue(a)?';color:var(--red);font-weight:700':'')+'">'+(a.due?fmtNice(new Date(a.due)):'—')+'</td><td><select class="taskstatus" onchange="setActionField('+a.id+',\'status\',this.value)">'+ACTION_ST.map(o=>'<option'+(a.status===o?' selected':'')+'>'+o+'</option>').join('')+'</select></td><td><span style="color:var(--red);cursor:pointer" onclick="delAction('+a.id+')">✕</span></td></tr>').join('');
 const hist=reviews.slice().sort((a,b)=>a.date<b.date?1:-1).filter(r=>r.notes&&r.notes[n.name]).map(r=>'<div class="rev-hist"><div class="rev-hd">'+fmtNice(new Date(r.date))+'</div><div class="rev-hn">'+esc(r.notes[n.name]).replace(/\n/g,'<br>')+'</div></div>').join('');
 return '<div class="stats c4" style="margin-bottom:14px">'
   +tile({ico:'check',color:(open.length?'#d97706':'#059669'),tint:(open.length?'#fef3c7':'#d1fae5'),val:open.length,lbl:'Open Actions'})
   +tile({ico:'warn',color:'#dc2626',tint:'#fee2e2',val:acts.filter(actOverdue).length,lbl:'Overdue'})
   +tile({ico:'check',color:'#059669',tint:'#d1fae5',val:acts.filter(a=>a.status==='Done').length,lbl:'Closed'})
   +tile({ico:'cal',color:'#2563eb',tint:'#dbeafe',val:reviews.filter(r=>r.notes&&r.notes[n.name]).length,lbl:'Reviews'})
 +'</div>'
 +'<div class="toolbar"><div style="flex:1"></div><button class="btn b-pri b-sm" onclick="addAction(\''+esc(n.name).replace(/'/g,"\\'")+'\',null)">'+svg(I.plus)+'Add Action</button></div>'
 +'<div class="card"><div class="card-h"><div class="ct">'+svg(I.check)+'Action Items</div></div><div class="tblwrap"><table class="tbl" style="min-width:680px"><thead><tr><th>✓</th><th>Action</th><th>Owner</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>'+(aRows||'<tr><td colspan="6" class="empty">No action items for this project</td></tr>')+'</tbody></table></div></div>'
 +'<div class="card" style="margin-top:14px"><div class="card-h"><div class="ct">'+svg(I.doc)+'Review Remarks History</div></div><div class="card-b">'+(hist||'<div class="empty">No review remarks logged yet</div>')+'</div></div>';
}

// ════════════════════════════ PPAP ════════════════════════════
let ppapProj='',ppapStat='',ppapSearch='',ppapSort='';
const PPAP_SORTS=['Status','Due Date (Latest)','Document Name (A-Z)','Project (A-Z)','Owner (A-Z)'];
const PPAP_SORT_FN={
 'Due Date (Soonest)':(a,b)=>(a.due||'').localeCompare(b.due||''),
 'Status':(a,b)=>(a.status||'').localeCompare(b.status||''),
 'Due Date (Latest)':(a,b)=>(b.due||'').localeCompare(a.due||''),
 'Document Name (A-Z)':(a,b)=>(a.element||'').localeCompare(b.element||''),
 'Project (A-Z)':(a,b)=>(a.proj||'').localeCompare(b.proj||''),
 'Owner (A-Z)':(a,b)=>(a.owner||'').localeCompare(b.owner||'')
};
function ppapFileChips(p){
 const files=(p.files||[]);
 return files.map((fl,fi)=>'<span class="chip-file">'+svg(I.doc)+'<span class="cf-open" onclick="openPpapFile('+p.id+','+fi+')">'+esc(fl.name)+'</span>'+(fl.id?'<span class="cf-tag">Uploaded</span>':(fl.link?'<span class="cf-tag" style="background:#dbeafe;color:#1e40af">link</span>':''))+'<span class="xf" onclick="delPpapFile('+p.id+','+fi+')">✕</span></span>').join('')
   +'<span style="font-size:10.5px;color:var(--acc);cursor:pointer;white-space:nowrap" onclick="addPpapFile('+p.id+')">'+svg(I.plus)+'Attach</span>';
}
function ppapRowHtml(p,admin,showProjCol){
 return '<tr><td>'+ppapBadge(p.status)+'</td><td class="lnk" style="cursor:pointer" onclick="editPpapModal('+p.id+')">'+esc(p.element)+'</td>'
  +(showProjCol?'<td class="mut">'+esc(p.proj)+'</td>':'')
  +'<td class="mut">'+esc(p.owner)+'</td><td class="mut">'+esc(p.due)+'</td><td class="mut">'+(esc(p.submitted)||'—')+'</td><td class="mut">'+(esc(p.approved)||'—')+'</td>'
  +'<td><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;max-width:220px">'+ppapFileChips(p)+'</div></td>'
  +'<td style="white-space:nowrap"><span style="cursor:pointer;color:var(--acc)" onclick="editPpapModal('+p.id+')">Edit</span>'+(admin?' · <span style="color:var(--red);cursor:pointer" onclick="delPpap('+p.id+')">✕</span>':'')+'</td></tr>';
}
function viewPpap(){const admin=isAdmin();
 ppap.forEach(p=>{if(p.id==null)p.id=ppapCtr++;if(!p.files)p.files=[];});
 const projs=[...new Set(ppap.map(p=>p.proj))];
 const prim=ppapProj||projs[0];
 const primSet=prim?ppap.filter(p=>p.proj===prim):[];
 const cnt=s=>primSet.filter(p=>p.status===s).length;
 const list=ppap.filter(p=>(!ppapProj||p.proj===ppapProj)&&(!ppapStat||p.status===ppapStat)&&(!ppapSearch||matchQ(p.element+' '+p.proj,ppapSearch))).slice().sort(PPAP_SORT_FN[ppapSort]||PPAP_SORT_FN['Due Date (Soonest)']);
 const projCards=projs.slice(0,3).map(pr=>{const set=ppap.filter(p=>p.proj===pr);const ap=set.filter(p=>p.status==='Approved').length;const rev=set.filter(p=>p.status==='Submitted'||p.status==='Interim Approval').length;const npd=npds.find(n=>n.name===pr);
   return '<div class="card" style="margin:0"><div class="card-b"><div style="font-size:14px;font-weight:700">'+esc(pr)+'</div><div class="pc-id" style="margin:2px 0 12px">'+(npd?npd.id:'')+'</div>'
   +'<div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:5px"><span class="mut">Elements Approved</span><b>'+ap+'/'+set.length+'</b></div>'
   +'<div class="pc-prog"><i style="width:'+(set.length?(ap/set.length*100):0)+'%"></i></div>'
   +'<div style="display:flex;gap:7px;margin-top:11px"><span class="pill" style="background:var(--greenT);color:var(--green)">'+ap+' Approved</span><span class="pill" style="background:var(--amberT);color:var(--amber)">'+rev+' Review</span></div>'
   +'</div></div>';}).join('');
 return ''
 +'<div class="phead"><div><h1>PPAP Documents</h1><div class="sub">Production Part Approval Process — 18 Element Tracking</div></div>'
   +'<div class="acts"><button class="btn b-gho" onclick="exportPpapCsv()">'+svg(I.export)+'Export</button><button class="btn b-gho" onclick="generatePpapModal()">'+svg(I.plus)+'Generate 18-Element Set</button><button class="btn b-pri" onclick="addPpapModal()">'+svg(I.plus)+'Add Document</button></div></div>'
 +'<div class="stats c4">'
   +tile({ico:'ppap',color:'#d97706',tint:'#fef3c7',val:primSet.length,lbl:'Total Documents'})
   +tile({ico:'check',color:'#059669',tint:'#d1fae5',val:cnt('Approved'),lbl:'Approved'})
   +tile({ico:'clock',color:'#d97706',tint:'#fef3c7',val:cnt('Submitted'),lbl:'Submitted'})
   +tile({ico:'warn',color:'#9ca3af',tint:'#f1f3f5',val:cnt('Not Started'),lbl:'Not Started'})
 +'</div>'
 +'<div class="toolbar"><div class="search">'+svg(I.search)+'<input placeholder="Search documents…" id="gsearch" value="'+esc(ppapSearch)+'" oninput="ppapSearch=this.value;render()"></div>'
   +sel2('ppapProj','All Projects',projs,ppapProj)+sel2('ppapStat','All Status',PPAP_STATUS,ppapStat)+sel2('ppapSort','Sort: Due Date (Soonest)',PPAP_SORTS,ppapSort)+'</div>'
 +(projCards?'<div class="stats" style="grid-template-columns:repeat(3,1fr)">'+projCards+'</div>':'')
 +'<div class="card"><div class="tblwrap"><table class="tbl" style="min-width:940px"><thead><tr><th>Status</th><th>Document Name</th><th>Project</th><th>Owner</th><th>Due Date</th><th>Submitted</th><th>Approved</th><th>Files</th><th></th></tr></thead><tbody>'
 +(list.length?list.map(p=>ppapRowHtml(p,admin,true)).join(''):'<tr><td colspan="9" class="empty" style="position:static">No PPAP documents yet. Click <b>Generate 18-Element Set</b> to create the standard checklist for a project, or <b>Add Document</b> for a single one.</td></tr>')
 +'</tbody></table></div></div>';
}
function ppapBadge(s){const m={'Approved':'bg-green','Under Review':'bg-amber','Submitted':'bg-blue','Not Started':'bg-gray'};return '<span class="badge '+(m[s]||'bg-gray')+'">'+s+'</span>';}
function npdPpapTab(n){
 ppap.forEach(p=>{if(p.id==null)p.id=ppapCtr++;if(!p.files)p.files=[];});
 const set=ppap.filter(p=>p.proj===n.name);
 const ap=set.filter(p=>p.status==='Approved').length;
 const sub=set.filter(p=>p.status==='Submitted'||p.status==='Interim Approval').length;

    +tile({ico:'check',color:'#059669',tint:'#d1fae5',val:ap,lbl:'Approved'})

 +'</tbody></table></div>'
 +'<p style="font-size:11px;color:var(--t3);margin-top:10px">This list is the same data as the main <b>PPAP Docs</b> module in the sidebar — anything you add, edit, or attach here shows up there too, and vice versa.</p>'
 +'</div></div>';

function addPpapModal(lockProj){ppapModal(null,lockProj);}
function editPpapModal(id){const idx=ppap.findIndex(x=>x.id===id);if(idx<0)return;ppapModal(idx);}
function ppapModal(i,lockProj){const d=(i!=null&&ppap[i])?ppap[i]:{proj:lockProj||'',element:'',status:'Not Started',owner:'',due:'',submitted:'',approved:''};
 const cl=v=>esc(v||'');
 const dl=(id,arr)=>'<datalist id="'+id+'">'+arr.map(x=>'<option value="'+esc(x)+'">').join('')+'</datalist>';
 const projOpts=[...new Set([...npds.map(n=>n.name),...ppap.map(p=>p.proj)])].filter(Boolean);
 const projField=lockProj?'<div class="fl"><label>Project</label><input value="'+cl(lockProj)+'" disabled></div>'
   :'<div class="fl"><label>Project</label><input id="pd-proj" list="pd-projs" value="'+cl(d.proj)+'" placeholder="Select or type project name">'+dl('pd-projs',projOpts)+'</div>';
 modal('<div class="modal-h"><div class="mt">'+svg(I.ppap)+(i!=null?'Edit PPAP Document':'Add PPAP Document')+'</div><div class="mx" onclick="closeModal()">×</div></div><div class="modal-b">'
 +projField
 +'<div class="fl"><label>Document / Element</label><input id="pd-element" list="pd-elements" value="'+cl(d.element)+'" placeholder="Select a standard element or type your own">'+dl('pd-elements',PPAP_ELEMENTS)+'</div>'
 +'<div class="fg2"><div class="fl"><label>Status</label><select id="pd-status">'+PPAP_STATUS.map(s=>'<option'+(d.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div>'
   +'<div class="fl"><label>Owner</label><select id="pd-owner">'+ownerOpts(d.owner||'')+'</select></div></div>'
 +'<div class="fg2"><div class="fl"><label>Due Date</label><input type="date" id="pd-due" value="'+cl(d.due)+'"></div>'

function printTrialForm(id){const t=trials.find(x=>x.id===id);if(!t)return;
 const w=window.open('','_blank');
 const line=(v)=>v?esc(v):'&nbsp;';
 const sec=(txt)=>'<tr><td colspan="6" class="sec">'+txt+'</td></tr>';

 const trialTypeDisplay=t.trialType==='Other'?('Other'+(t.otherTrialType?' — '+esc(t.otherTrialType):'')):line(t.trialType);
 w.document.write('<html><head><title>Trial Form '+esc(t.trialNo)+'</title><style>'

  +'.lbl{font-weight:700}.tall{height:95px}'
  +'.hdrtbl{width:100%;border-collapse:collapse;border:2px solid #000;margin-bottom:0}'
  +'.hdrtbl td{border:none;vertical-align:middle;padding:6px 10px}'
  +'.title{font-size:19px;font-weight:800;text-align:center}'
  +'.meta{font-size:10px;text-align:right;line-height:1.5;white-space:nowrap}'
  +'</style></head><body>'
  +'<table class="hdrtbl"><tr>'
    +'<td style="width:22%;border-bottom:2px solid #000"><img src="data:image/jpeg;base64,'+TRIAL_LOGO_B64+'" style="height:34px"></td>'
    +'<td class="title" style="width:56%;border-bottom:2px solid #000;border-left:2px solid #000;border-right:2px solid #000">Trial Request &amp; Approval Form</td>'
    +'<td class="meta" style="width:22%;border-bottom:2px solid #000">Format No. : AIPL/F/PE/MTR/08<br>Rev. No. : 01<br>Rev. Date : 02/06/2026</td>'
  +'</tr></table>'

  +'<tr><td colspan="6" class="lbl">Trial Type :- <span style="font-weight:400">'+trialTypeDisplay+'</span></td></tr>'
  +'<tr><td colspan="6" class="lbl">Project Name :- <span style="font-weight:400">'+line(t.project)+'</span></td></tr>'

  +'<tr><td class="lbl" colspan="3">BOM Parts Available :- <span style="font-weight:400">'+line(t.bomPartsAvail)+'</span></td><td class="lbl" colspan="3">Trial Qty. (to be produced during this trial) : <span style="font-weight:400">'+line(t.qty)+'</span></td></tr>'

  +'<script>window.onload=()=>window.print();<\/script></body></html>');
 w.document.close();}

function viewTrialDetail(id){const t=trials.find(x=>x.id===id);if(!t)return '<div class="empty">Trial not found</div>';
 trialInit(t);const admin=isAdmin();
 const editable=canEditTrial(t); // core form fields — owner while Draft, or admin any time
 const ownerOrAdmin=admin||isTrialOwner(t); // post-submission workflow actions (attach signed copy, HOD tracking, PPC slot)
 const dis=editable?'':'disabled';
 const ro=!editable; // read-only viewer (not owner, not admin, or locked)
 const chg=(key)=>'onchange="setTrial(\''+id+'\',\''+key+'\',this.value)"';
 const tf=(key,ta)=>ta?'<textarea '+dis+' '+chg(key)+'>'+esc(t[key]||'')+'</textarea>':'<input value="'+esc(t[key]||'')+'" '+dis+' '+chg(key)+'>';
 const tfd=(key)=>'<input type="date" value="'+esc(t[key]||'')+'" '+dis+' '+chg(key)+'>';
 const fsel=(key,opts)=>editable?'<select '+chg(key)+'><option value="">—</option>'+opts.map(o=>'<option'+(t[key]===o?' selected':'')+'>'+o+'</option>').join('')+'</select>':'<input value="'+esc(t[key]||'')+'" disabled>';
 const sec=(txt)=>'<tr><td colspan="6" class="sec">'+txt+'</td></tr>';
 const filesHtml=(t.files||[]).map((fl,fi)=>'<span class="chip-file">'+svg(I.doc)+'<span class="cf-open" onclick="openTrialFile(\''+id+'\','+fi+')">'+esc(fl.name)+'</span>'+(fl.id?'<span class="cf-tag">Uploaded</span>':(fl.link?'<span class="cf-tag" style="background:#dbeafe;color:#1e40af">link</span>':''))+(editable?'<span class="xf" onclick="delTrialFile(\''+id+'\','+fi+')">✕</span>':'')+'</span>').join('');
 const ppcEmail=PPC_EMAIL_BY_SECTION[t.section]||'';
 return ''
 +'<div class="dethead" style="flex-direction:column;align-items:stretch;justify-content:flex-start;gap:2px">'
   +'<div style="display:flex;justify-content:space-between;align-items:center">'

       +(admin?'<span style="font-size:11px;color:var(--red);font-weight:600;cursor:pointer" onclick="deleteTrial(\''+id+'\')">Delete</span>':'')
     +'</div>'
   +'</div>'
   +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">'
     +'<h1>'+esc(t.trialNo)+'</h1>'
     +'<div style="display:flex;gap:10px;align-items:center">'+trialBadge(t.status)+trialWorkflowBtn(t)+'</div>'
   +'</div>'
   +'<div class="dsub">'+esc(t.project)+' · '+esc(t.section)+' · '+esc(t.dept)+' · '+esc(t.originator)+(t.date?' · '+esc(t.date):'')+'</div>'
 +'</div>'
 +(ro?'<div class="dm-note" style="margin-bottom:12px;background:#f1f3f5;border:1px solid var(--bd);padding:8px 12px;border-radius:8px;font-size:11.5px">'+(isTrialOwner(t)?'This trial has been submitted — it\u2019s now view-only. An admin can still edit if something needs correcting.':'View only — only '+esc(t.originator)+' (the originator) or an admin can edit this form.')+'</div>':'')
 +'<div class="tform-wrap">'
 +'<table class="tform-hdr"><tr>'
   +'<td style="width:22%;border-bottom:2px solid #1a1a1a"><img src="data:image/jpeg;base64,'+TRIAL_LOGO_B64+'" style="height:28px"></td>'

   +'<td class="tform-meta" style="width:22%;border-bottom:2px solid #1a1a1a">Format No. : AIPL/F/PE/MTR/08<br>Rev. No. : 01 &nbsp;·&nbsp; Rev. Date : 02/06/2026</td>'

// Sends the current app data + your question to Claude via the backend,
// so it can analyze across every module (RFQs, NPD/POC projects, BOM,
// ECN, PPAP, Samples, Trials, budget, resources — all of it).
let aiChat=[]; // [{role:'user'|'assistant', content, ts}]
let aiBusy=false;
let aiFloatOpen=false;

function aiBubblesHtml(){
 const bubble=(m)=>'<div class="ai-msg '+(m.role==='user'?'ai-user':'ai-bot')+'">'
   +'<div class="ai-bubble">'+(m.role==='user'?esc(m.content):mdLite(m.content))+'</div></div>';
 return (aiChat.length?aiChat.map(bubble).join(''):'<div class="empty" style="position:static;padding:30px 16px;font-size:12px">Try: "What\'s overdue right now?" · "Summarize the Fan Motor V2 project"</div>')
   +(aiBusy?'<div class="ai-msg ai-bot"><div class="ai-bubble ai-typing">Thinking…</div></div>':'');
}
function viewAskAI(){
 const configured=!!dbApiBase;
 return ''
 +'<div class="phead"><div><h1>Ask AI</h1><div class="sub">Ask questions about everything in Projexa — overdue items, project status, who owns what, budget vs. actuals — answered from your live data.</div></div>'
   +(aiChat.length?'<div class="acts"><button class="btn b-gho" onclick="clearAiChat()">Clear conversation</button></div>':'')
 +'</div>'
 +(!configured?'<div class="card"><div class="card-b"><div class="dm-note" style="background:#fffbeb;border:1px solid #fde68a;padding:10px 14px;border-radius:8px">Connect the database first (top-right "Database not connected" button) — the AI reads from the same shared data, so it needs that connection to work.</div></div></div>'
 :'<div class="card" style="display:flex;flex-direction:column;height:64vh">'
   +'<div id="ai-log" style="flex:1;overflow-y:auto;padding:16px">'+aiBubblesHtml()+'</div>'
   +'<div style="border-top:1px solid var(--bd);padding:12px 14px;display:flex;gap:8px">'
     +'<input id="ai-input" placeholder="Ask about any project, task, or number in Projexa…" style="flex:1;border:1px solid var(--bd);border-radius:8px;padding:9px 12px;font-size:13px" onkeydown="if(event.key===\'Enter\')sendAiQuestion(\'page\')" '+(aiBusy?'disabled':'')+'>'
     +'<button class="btn b-pri" onclick="sendAiQuestion(\'page\')" '+(aiBusy?'disabled':'')+'>Ask</button>'
   +'</div>'
 +'</div>');
}
function clearAiChat(){aiChat=[];render();renderAiFloat();}
function mdLite(s){ // tiny, safe subset: escape then restore **bold**, bullets, newlines
 let t=esc(s||'');
 t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
 t=t.replace(/\n- (.+)/g,'\n• $1');
 t=t.replace(/\n/g,'<br>');
 return t;
}
function toggleAiFloat(){
 aiFloatOpen=!aiFloatOpen;
 const panel=$('ai-float-panel');if(!panel)return;
 panel.style.display=aiFloatOpen?'flex':'none';
 if(aiFloatOpen){renderAiFloat();setTimeout(()=>{const i=$('ai-float-input');if(i)i.focus();},50);}
}
function renderAiFloat(){
 const panel=$('ai-float-panel');if(!panel||panel.style.display==='none')return;
 const configured=!!dbApiBase;
 const log=$('ai-float-log');if(!log)return;
 log.innerHTML=configured?aiBubblesHtml():'<div class="dm-note" style="background:#fffbeb;border:1px solid #fde68a;padding:10px 12px;border-radius:8px;font-size:12px">Connect the database first (top-right "Database not connected" button) to use Ask AI.</div>';
 const inp=$('ai-float-input');if(inp)inp.disabled=!configured||aiBusy;
 log.scrollTop=log.scrollHeight;
}
function updateAiFabVisibility(){
 const fab=$('ai-fab');if(!fab)return;
 fab.style.display=(route==='ai')?'none':'flex';
}
async function sendAiQuestion(context){
 const inpId=context==='float'?'ai-float-input':'ai-input';
 const inp=$(inpId);if(!inp)return;const q=inp.value.trim();if(!q||aiBusy)return;
 aiChat.push({role:'user',content:q});
 aiBusy=true;inp.value='';
 if(route==='ai')render();
 renderAiFloat();
 try{
  const history=aiChat.slice(0,-1).slice(-8).map(m=>({role:m.role,content:m.content})); // last few turns for follow-ups
  const res=await dbFetch('/ai/ask',{method:'POST',body:JSON.stringify({question:q,history})});
  const body=await res.json();
  if(!res.ok)throw new Error(body.error||'Request failed');
  aiChat.push({role:'assistant',content:body.answer||'(no answer)'});
 }catch(e){
  aiChat.push({role:'assistant',content:'Sorry — I couldn\'t reach the AI service ('+e.message+'). Check that the backend has ANTHROPIC_API_KEY set and is reachable.'});
 }
 aiBusy=false;
 if(route==='ai'){render();setTimeout(()=>{const log=$('ai-log');if(log)log.scrollTop=log.scrollHeight;const i=$('ai-input');if(i)i.focus();},0);}
 renderAiFloat();
 if(context==='float')setTimeout(()=>{const i=$('ai-float-input');if(i)i.focus();},0);
}

function uploadSample(){const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.xlsx,.xls';
 inp.onchange=function(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();

function sampleImportRows(rows){if(!rows||!rows.length){toast('Empty file');return;}
 let hi=rows.findIndex(r=>r&&r.some(c=>/project name|project/i.test(String(c||''))));if(hi<0)hi=0;
 const hdr=rows[hi].map(h=>String(h||'').toLowerCase().trim());
 const find=keys=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
 const C={cat:find(['category','cat']),proj:find(['project name','project']),cust:find(['customer']),spec:find(['spec']),qty:find(['qty','quantity']),req:find(['req','received']),draw:find(['drawing']),mat:find(['material']),plan:find(['planned submission','planned sub']),asm:find(['assembly']),insp:find(['inspection']),sub:find(['submission to customer','submission']),rem:find(['remarks']),planner:find(['planner']),status:find(['status'])};
 if(C.proj<0){toast('Could not find a "Project Name" column');return;}
 const normSt=s=>{s=(s||'').trim();return SAMPLE_ST.includes(s)?s:(s?'In Progress':'New');};
 let added=0;
 for(let r=hi+1;r<rows.length;r++){const row=rows[r];if(!row)continue;const g=i=>i>=0?String(row[i]||'').trim():'';
   const proj=g(C.proj);if(!proj)continue;
   samples.unshift({id:sampleCtr++,status:normSt(g(C.status)),cat:g(C.cat)||'CF',project:proj,customer:g(C.cust)||'ATPL',spec:g(C.spec),qty:g(C.qty),reqDate:ecnDateNorm(g(C.req)),drawing:g(C.draw),material:g(C.mat),plannedSub:ecnDateNorm(g(C.plan)),assembly:ecnDateNorm(g(C.asm)),inspection:ecnDateNorm(g(C.insp)),submission:ecnDateNorm(g(C.sub)),remarks:g(C.rem),planner:g(C.planner)});
   added++;}
 saveState();render();toast(added+' samples imported','success');}

const PT_MODC={npd:['#1d4ed8','#dbeafe'],poc:['#6d28d9','#ede9fe'],act:['#b45309','#fef3c7'],smp:['#0f766e','#ccfbf1']};

function ptTodayIso(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ptAddIso(iso,n){const a=iso.split('-').map(Number);const d=new Date(a[0],a[1]-1,a[2]);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ptSlip(iso,todayIso){const a=iso.split('-').map(Number),b=todayIso.split('-').map(Number);return Math.round((new Date(a[0],a[1]-1,a[2])-new Date(b[0],b[1]-1,b[2]))/86400000);}
function pendingItems(){const out=[];
 npds.forEach(p=>{initNpd(p);ensureTaskPlan(p);(p.tasks||[]).forEach(t=>{if(stKey(t.status,t.pct)!=='done')out.push({src:'npd',a:p.id,b:String(t.n),proj:p.name,task:(t.n?t.n+' · ':'')+(t.name||''),owner:t.resp||'',status:t.status||'Not Started',vocab:TASK_ST,planEnd:t.planEnd||'',actualStart:t.actualStart||'',actualEnd:t.actualEnd||'',remarks:t.remarks||'',hasActual:true});});});
 pocs.forEach(p=>{pocInit(p);(p.tasks||[]).forEach((t,idx)=>{if(p.skip&&p.skip[t.stage])return;if(stKey(t.status,t.pct)!=='done')out.push({src:'poc',a:p.id,b:String(idx),proj:p.name,task:(t.n?t.n+' · ':'')+(t.name||''),owner:t.resp||'',status:t.status||'Not Started',vocab:TASK_ST,planEnd:t.planEnd||'',actualStart:t.actualStart||'',actualEnd:t.actualEnd||'',remarks:t.remarks||'',hasActual:true});});});
 momActions.forEach(a=>{if(a.status==='Done')return;out.push({src:'act',a:String(a.id),b:'',proj:a.proj||'Weekly Review',task:a.text||'',owner:a.owner||'',status:a.status||'Open',vocab:ACTION_ST,planEnd:a.due||'',actualStart:'',actualEnd:'',remarks:a.note||'',hasActual:false});});
 samples.forEach(s=>{if(sampleDone(s))return;out.push({src:'smp',a:String(s.id),b:'',proj:s.project||'Sample',task:(s.project||'(sample)')+(s.qty?' · '+s.qty+' pcs':''),owner:s.owner||'',status:s.status||'New',vocab:SAMPLE_ST,planEnd:s.plannedSub||'',actualStart:s.assembly||'',actualEnd:s.submission||'',remarks:s.remarks||'',hasActual:true});});
 return out;}
function pendSet(src,a,b,field,val){
 const map={npd:{planEnd:'planEnd',actualStart:'actualStart',actualEnd:'actualEnd',owner:'resp',status:'status',remarks:'remarks'},
  poc:{planEnd:'planEnd',actualStart:'actualStart',actualEnd:'actualEnd',owner:'resp',status:'status',remarks:'remarks'},
  act:{planEnd:'due',owner:'owner',status:'status',remarks:'note'},
  smp:{planEnd:'plannedSub',actualStart:'assembly',actualEnd:'submission',owner:'owner',status:'status',remarks:'remarks'}};
 const f=map[src]&&map[src][field];if(!f)return;
 if(src==='npd')setTaskField(a,b,f,val);
 else if(src==='poc')setPocTask(a,parseInt(b),f,val);
 else if(src==='act')setActionField(parseInt(a),f,val);
 else if(src==='smp')setSample(parseInt(a),f,val);}

function emailForName(name){if(!name)return '';const u=users.find(x=>x.name===name);return u?(u.email||''):'';}
function openMail(to,subject,body){const a=document.createElement('a');a.href='mailto:'+(to||'')+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);a.style.display='none';document.body.appendChild(a);a.click();setTimeout(function(){a.remove();},150);}
function pendDateMatch(it,filter){const todayIso=ptTodayIso();const yIso=ptAddIso(todayIso,-1),tomIso=ptAddIso(todayIso,1);const dt=todayIso.split('-');const dow=(new Date(dt[0],dt[1]-1,dt[2]).getDay()+6)%7;const sow=ptAddIso(todayIso,-dow),eow=ptAddIso(sow,6),nws=ptAddIso(sow,7),nwe=ptAddIso(sow,13);const pe=it.planEnd;switch(filter){case 'overdue':return (pe&&pe<todayIso)||it.status==='Delayed';case 'yesterday':return pe===yIso;case 'today':return pe===todayIso;case 'tomorrow':return pe===tomIso;case 'thisweek':return pe&&pe>=sow&&pe<=eow;case 'nextweek':return pe&&pe>=nws&&pe<=nwe;case 'nodate':return !pe;default:return true;}}
function pendingForReminder(){return pendingItems().filter(it=>pendDateMatch(it,pendFilter)).filter(it=>!pendSearch||matchQ(it.task+' '+it.proj+' '+it.owner+' '+it.remarks,pendSearch));}

  +'Project: '+it.proj+'\nTask: '+it.task+'\nStatus: '+it.status+'\nPlanned end: '+(it.planEnd||'—')+'\n'+(it.actualStart?'Actual start: '+it.actualStart+'\n':'')+(it.remarks?'Remarks: '+it.remarks+'\n':'')

const U_KEY='projexa_users_v1', S_KEY='projexa_session_v1', U_VER='projexa_users_ver';
const SEED_VERSION='2026-06-25-emp207';
async function sha256(str){try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}catch(e){let h=5381;for(let i=0;i<str.length;i++)h=((h<<5)+h+str.charCodeAt(i))>>>0;return 'fb'+h.toString(16);}}
function loadUsers(){
 if(Array.isArray(users)&&users.length)return; // already populated from synced app-state (loadState/loadFromDb)
 try{const ver=localStorage.getItem(U_VER);const raw=localStorage.getItem(U_KEY);if(raw&&ver===SEED_VERSION){const a=JSON.parse(raw);if(Array.isArray(a)&&a.length){users=a;return;}}}catch(e){}
 users=SEED_USERS.map(u=>Object.assign({},u));saveUsers();}
function saveUsers(){try{localStorage.setItem(U_KEY,JSON.stringify(users));localStorage.setItem(U_VER,SEED_VERSION);}catch(e){}saveState();}
function findUser(u){u=(u||'').trim().toLowerCase();return users.find(x=>x.user.toLowerCase()===u||(x.email||'').toLowerCase()===u);}
function isAdmin(){return CURRENT_USER&&CURRENT_USER.role==='admin';}
const MODULE_NAV=NAV.filter(n=>n.k!=='home'&&n.k!=='users');
function hasModuleAccess(key){
 if(!CURRENT_USER)return false;
 if(key==='home')return true;
 if(key==='users')return isAdmin();
 if(isAdmin())return true;
 const u=users.find(x=>x.user===CURRENT_USER.user);
 if(!u||!Array.isArray(u.modules))return true; // not configured yet → unrestricted (back-compat default)
 return u.modules.includes(key);
}

function cmpVals(a,b,dir){const ae=(a===null||a===undefined||a==='');const be=(b===null||b===undefined||b==='');if(ae&&be)return 0;if(ae)return 1;if(be)return -1;if(typeof a==='string'&&typeof b==='string')return a.toLowerCase().localeCompare(b.toLowerCase())*dir;return (a<b?-1:a>b?1:0)*dir;}

function viewBudget(){
 const planned=budget.reduce((a,b)=>a+b.planned,0);
 const actual=budget.reduce((a,b)=>a+b.actual,0);
 const variance=planned-actual;
 const under=budget.filter(b=>b.actual<=b.planned).length;
 const over=budget.filter(b=>b.actual>b.planned).length;
 const list=budget.filter(b=>!budSearch||matchQ(b.desc+' '+b.proj+' '+b.cat,budSearch)).slice().sort(budSort?BUD_SORT_FN[budSort]:(a,b)=>0);
 // category aggregation
 const catAgg=BUD_CATS.map(c=>{const items=budget.filter(b=>b.cat===c);return {c,p:items.reduce((a,b)=>a+b.planned,0),a:items.reduce((a,b)=>a+b.actual,0)};}).filter(x=>x.p>0);
 const maxCat=Math.max(...catAgg.map(x=>Math.max(x.p,x.a)),1);
 const projAgg=[...new Set(budget.map(b=>b.proj))].map(pr=>{const items=budget.filter(b=>b.proj===pr);return {pr,npd:items[0].npd,p:items.reduce((a,b)=>a+b.planned,0),a:items.reduce((a,b)=>a+b.actual,0)};});
 return ''
 +'<div class="phead"><div><h1>Budget Management</h1><div class="sub">Consolidated project budget tracking</div></div>'
   +'<div class="acts"><button class="btn b-gho" onclick="toast(\'Export ready\',\'success\')">'+svg(I.export)+'Export</button></div></div>'
 +'<div class="stats c4">'
   +tile({ico:'budget',color:'#059669',tint:'#d1fae5',val:lakh(planned),lbl:'Total Planned',cap:'Across '+projAgg.length+' projects'})
   +tile({ico:'budget',color:'#2563eb',tint:'#dbeafe',val:lakh(actual),lbl:'Total Actual',barPct:Math.round(actual/planned*100),barColor:'#2563eb'})
   +tile({ico:'trend',color:'#059669',tint:'#d1fae5',val:(variance>=0?'+':'')+lakh(Math.abs(variance)),lbl:'Variance',cap:variance>=0?'Under budget':'Over budget'})
   +tile({ico:'doc',color:'#d97706',tint:'#fef3c7',val:budget.length,lbl:'Budget Items',pills:'<div class="pills"><span class="pill" style="background:var(--greenT);color:var(--green)">'+under+' under</span><span class="pill" style="background:var(--redT);color:var(--red)">'+over+' over</span></div>'})
 +'</div>'
 +'<div class="dgrid">'
   +'<div class="card"><div class="card-h"><div class="ct">'+svg(I.budget)+'Budget by Category</div></div><div class="card-b"><div class="barchart">'
     +catAgg.map(x=>'<div class="barrow"><div class="bl">'+x.c+'</div><div class="bset"><div class="bseg" style="width:'+(x.p/maxCat*100)+'%;background:var(--amber)"></div><div class="bseg" style="width:'+(x.a/maxCat*100)+'%;background:var(--green)"></div></div></div>').join('')
     +'</div><div class="pipelegend" style="margin-top:14px"><div class="lg"><span class="dot" style="background:var(--amber)"></span>Planned</div><div class="lg"><span class="dot" style="background:var(--green)"></span>Actual</div></div></div></div>'
   +'<div class="card"><div class="card-h"><div class="ct">'+svg(I.trend)+'Budget by Project</div></div><div class="card-b"><div class="projbudget">'
     +projAgg.map(x=>{const v=x.p-x.a;return '<div class="pbrow"><div class="pbtop"><div><div class="pbn">'+esc(x.pr)+'</div><div class="pbid">'+(x.npd||'')+'</div></div><div style="text-align:right"><div>'+lakh(x.p)+' / '+lakh(x.a)+'</div><div style="font-size:10.5px;color:'+(v>=0?'var(--green)':'var(--red)')+'">'+(v>=0?'+':'')+lakh(Math.abs(v))+'</div></div></div><div class="pbar"><i style="width:'+Math.min(x.a/x.p*100,100)+'%;background:'+(x.a>x.p?'var(--red)':'var(--acc)')+'"></i></div></div>';}).join('')
     +'</div></div></div>'
 +'</div>'
 +'<div class="toolbar"><div class="search">'+svg(I.search)+'<input placeholder="Search budget items…" value="'+esc(budSearch)+'" id="gsearch" oninput="budSearch=this.value;render()"></div>'+sel2('budSort','Sort: Default',BUD_SORTS,budSort)+'</div>'
 +'<div class="card"><div class="tblwrap"><table class="tbl" style="min-width:760px"><thead><tr><th>Description</th><th>Project</th><th>Category</th><th>Planned</th><th>Actual</th><th>Variance</th><th>Status</th></tr></thead><tbody>'
 +list.map(b=>{const v=b.planned-b.actual;return '<tr><td>'+esc(b.desc)+'</td><td class="lnk">'+esc(b.proj)+'</td><td><span class="badge bg-gray">'+b.cat+'</span></td><td class="mut">'+lakh(b.planned)+'</td><td>'+lakh(b.actual)+'</td><td style="color:'+(v>=0?'var(--green)':'var(--red)')+';font-weight:600">'+(v>=0?'+':'')+lakh(Math.abs(v))+'</td><td>'+(v>=0?'<span class="badge bg-green">Under</span>':'<span class="badge bg-red">Over</span>')+'</td></tr>';}).join('')
 +'</tbody></table></div></div>';
}

 d.rev=parseInt(d.rev,10)||1;
 if(!d.status)d.status='Active';
 if(d.pendingRev===undefined)d.pendingRev=null;
 if(!d.history)d.history=[{rev:d.rev,date:d.effDate||'',reason:'Initial release',changedBy:d.owner||'',status:'Live',approvals:[]}];

function stdRevisionModal(i){const d=stdDocs[i];if(!d)return;stdInit(d);

 if(d.pendingRev){stdPendingModal(i);return;}
 modal('<div class="modal-h"><div class="mt">'+svg(I.sync)+'Revise / Upgrade — '+esc(d.title)+'</div><div class="mx" onclick="closeModal()">×</div></div><div class="modal-b" style="max-height:70vh;overflow:auto">'
 +'<div class="dm-note" style="margin-bottom:10px">Current: <b>Rev '+d.rev+'</b>. Submitting this creates <b>Rev '+(d.rev+1)+'</b>, which stays locked until every required approval below comes in.</div>'
 +'<div class="fl"><label>Reason for Change</label><textarea id="rv-reason" rows="2" placeholder="Why is this revision needed?"></textarea></div>'
 +'<div style="font-size:12.5px;font-weight:700;margin:14px 0 8px;border-top:1px solid var(--bd);padding-top:12px">Approvals Required</div>'

 +'</div><div class="modal-f"><button class="btn b-gho" onclick="closeModal()">Cancel</button><button class="btn b-pri" onclick="submitStdRevision('+i+')">Submit for Approval</button></div>');}
function submitStdRevision(i){const d=stdDocs[i];if(!d)return;stdInit(d);
 const reason=$('rv-reason').value.trim();
 if(!reason){toast('Reason for change is required');return;}
 const approvals=STD_APPR_DEPTS.map(([k,lbl])=>{const val=$('rv-appr-'+k).value.trim();return {dept:k,deptLabel:lbl,approver:val,status:val?'Pending':'Not Required'};});
 const who=(CURRENT_USER&&(CURRENT_USER.name||CURRENT_USER.user))||'';
 const rev={rev:d.rev+1,date:isoOf(new Date()),reason,changedBy:who,status:'Pending Approval',approvals,files:[]};
 d.pendingRev=rev;d.status='Pending Approval';
 saveState();
 const anyRequired=approvals.some(a=>a.status==='Pending');
 if(anyRequired){
  approvals.filter(a=>a.status==='Pending').forEach(a=>{
   notifyAssigned(a.approver,'Rev '+rev.rev+' of "'+d.title+'" needs your approval ('+a.deptLabel+')','Standards Library — Approval Required',d.title,'');
  });
  closeModal();render();toast('Submitted for approval — notification email(s) sent','success');
 } else {
  checkStdPromote(i);closeModal();render();toast('No approvals required — Rev '+d.rev+' is live','success');
 }
}
function stdPendingModal(i){const d=stdDocs[i];if(!d||!d.pendingRev)return;const r=d.pendingRev;
 const rows=r.approvals.map(a=>{const canAction=(isAdmin()||(CURRENT_USER&&(CURRENT_USER.name===a.approver||CURRENT_USER.user===a.approver)))&&a.status==='Pending';
  return '<tr><td style="font-size:12.5px;font-weight:600">'+a.deptLabel+'</td><td style="font-size:12px">'+(a.approver||'<span class="mut">—</span>')+'</td><td>'+stdApprBadge(a.status)+'</td>'
   +'<td style="text-align:right;white-space:nowrap">'+(canAction?'<span style="color:var(--green);cursor:pointer;font-size:11.5px;font-weight:600;margin-right:10px" onclick="stdApprove('+i+',\''+a.dept+'\')">Approve</span><span style="color:var(--red);cursor:pointer;font-size:11.5px;font-weight:600" onclick="stdReject('+i+',\''+a.dept+'\')">Reject</span>':'')+'</td></tr>';}).join('');
 const files=(r.files||[]).map(fl=>'<span class="chip-file">'+svg(I.doc)+'<span style="font-size:11.5px">'+esc(fl.name)+'</span><span class="cf-tag" style="background:#fef3c7;color:#92400e">🔒 locked until approved</span></span>').join('');
 modal('<div class="modal-h"><div class="mt">'+svg(I.sync)+'Rev '+r.rev+' — Pending Approval</div><div class="mx" onclick="closeModal()">×</div></div><div class="modal-b" style="max-height:70vh;overflow:auto">'
 +'<div class="fl"><label>Document</label><input value="'+esc(d.title)+'" disabled></div>'
 +'<div class="fl"><label>Reason for Change</label><textarea disabled rows="2">'+esc(r.reason)+'</textarea></div>'
 +'<div class="fl"><label>Submitted By / Date</label><input value="'+esc(r.changedBy)+' · '+esc(r.date)+'" disabled></div>'
 +'<div style="margin:10px 0"><label style="font-size:11.5px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px">Revision File</label><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+(files||'<span class="mut" style="font-size:11.5px">No file attached yet</span>')+(stdCanManage(d)?'<span style="font-size:11px;color:var(--acc);cursor:pointer" onclick="addStdRevFile('+i+')">'+svg(I.plus)+'Attach</span>':'')+'</div></div>'
 +'<table class="tbl" style="margin-top:8px"><thead><tr><th>Department</th><th>Approver</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>'
 +(stdCanManage(d)?'<p style="font-size:11px;color:var(--t3);margin-top:10px"><span style="color:var(--red);cursor:pointer" onclick="stdCancelRevision('+i+')">Cancel this revision</span> — reverts to the current live version.</p>':'')
 +'</div><div class="modal-f"><button class="btn b-gho" onclick="closeModal()">Close</button></div>');}
function stdApprBadge(s){const m={'Pending':['#b45309','#fef3c7'],'Approved':['#047857','#d1fae5'],'Rejected':['#b91c1c','#fee2e2'],'Not Required':['#475569','#e2e8f0']}[s]||['#475569','#e2e8f0'];return '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:9px;color:'+m[0]+';background:'+m[1]+'">'+s+'</span>';}
function stdApprove(i,deptKey){const d=stdDocs[i];if(!d||!d.pendingRev)return;
 const appr=d.pendingRev.approvals.find(a=>a.dept===deptKey);if(!appr)return;
 const isApprover=isAdmin()||(CURRENT_USER&&(CURRENT_USER.name===appr.approver||CURRENT_USER.user===appr.approver));
 if(!isApprover){toast('Only the assigned approver or an admin can approve this','error');return;}
 appr.status='Approved';appr.respondedDate=isoOf(new Date());
 const promoted=checkStdPromote(i);
 saveState();
 if(promoted){closeModal();render();}else{render();stdPendingModal(i);}
}
function stdReject(i,deptKey){const d=stdDocs[i];if(!d||!d.pendingRev)return;
 const appr=d.pendingRev.approvals.find(a=>a.dept===deptKey);if(!appr)return;
 const isApprover=isAdmin()||(CURRENT_USER&&(CURRENT_USER.name===appr.approver||CURRENT_USER.user===appr.approver));
 if(!isApprover){toast('Only the assigned approver or an admin can reject this','error');return;}
 if(!confirm('Reject this revision? The document stays on its current live version.'))return;
 appr.status='Rejected';appr.respondedDate=isoOf(new Date());
 d.pendingRev.status='Rejected';
 d.history.unshift(d.pendingRev);d.pendingRev=null;d.status='Active';
 saveState();closeModal();render();toast('Revision rejected — document remains on its current version','error');
}
function stdCancelRevision(i){const d=stdDocs[i];if(!d||!d.pendingRev)return;
 if(!confirm('Cancel this pending revision? It will be logged as cancelled and the current live version stays as-is.'))return;
 d.pendingRev.status='Cancelled';d.history.unshift(d.pendingRev);d.pendingRev=null;d.status='Active';
 saveState();closeModal();render();toast('Revision cancelled');
}
function checkStdPromote(i){const d=stdDocs[i];if(!d||!d.pendingRev)return false;
 const allDone=d.pendingRev.approvals.every(a=>a.status==='Approved'||a.status==='Not Required');
 if(!allDone)return false;
 if(d.pendingRev.files&&d.pendingRev.files.length)d.files=d.pendingRev.files;
 d.rev=d.pendingRev.rev;
 (d.history||[]).forEach(h=>{if(h.status==='Live')h.status='Superseded';});
 d.pendingRev.status='Live';
 d.history.unshift(d.pendingRev);
 d.pendingRev=null;d.status='Active';
 toast('All approvals received — Rev '+d.rev+' is now live','success');
 return true;
}
function stdHistoryModal(i){const d=stdDocs[i];if(!d)return;stdInit(d);
 const rows=(d.history||[]).map(h=>{
   const apprSummary=(h.approvals||[]).filter(a=>a.status!=='Not Required').map(a=>a.deptLabel+': '+a.approver+' ('+a.status+')').join(', ');
   return '<tr><td style="text-align:center;font-weight:700">'+h.rev+'</td><td style="font-size:12px">'+esc(h.date||'—')+'</td><td style="font-size:12px">'+esc(h.reason||'—')+'</td><td style="font-size:12px">'+esc(h.changedBy||'—')+'</td><td>'+stdStBadge(h.status==='Live'?'Active':(h.status==='Superseded'?'Obsolete':h.status))+'</td><td style="font-size:10.5px;color:var(--t3)">'+(apprSummary||'—')+'</td></tr>';

function _crc32(buf){let crc=-1;for(let i=0;i<buf.length;i++){let c=(crc^buf[i])&0xff;for(let k=0;k<8;k++)c=c&1?(c>>>1)^0xEDB88320:c>>>1;crc=(crc>>>8)^c;}return (crc^-1)>>>0;}

 files.forEach(f=>{const name=enc.encode(f.name);const data=f.data;const crc=_crc32(data);
  const local=[].concat([0x50,0x4b,0x03,0x04],u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
  chunks.push(new Uint8Array(local),name,data);const lho=offset;offset+=local.length+name.length+data.length;
  const cen=[].concat([0x50,0x4b,0x01,0x02],u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(lho));
  central.push({hdr:new Uint8Array(cen),name:name});});
 let cstart=offset,csize=0,centralChunks=[];central.forEach(c=>{centralChunks.push(c.hdr,c.name);csize+=c.hdr.length+c.name.length;});
 const end=[].concat([0x50,0x4b,0x05,0x06],u16(0),u16(0),u16(files.length),u16(files.length),u32(csize),u32(cstart),u16(0));
 const total=offset+csize+22;const out=new Uint8Array(total);let pos=0;
 chunks.forEach(c=>{out.set(c,pos);pos+=c.length;});centralChunks.forEach(c=>{out.set(c,pos);pos+=c.length;});out.set(new Uint8Array(end),pos);
 return out;}

function exportProjectFile(kind,id){
 const p=(kind==='poc'?pocs:npds).find(x=>x.id===id);if(!p)return;

 let blocks='';
 // ---- meta ----

 blocks+='<div class="meta">'+meta.filter(m=>m[1]!=null&&m[1]!=='').map(m=>'<div><span>'+_xe(m[0])+'</span><b>'+_xe(m[1])+'</b></div>').join('')+'</div>';

 if(!isPoc){
   for(let gi=0;gi<GATES.length;gi++){const G=GATES[gi];const gkey=G.g.replace('-','');if(p.category&&!gateIncluded(p,gkey))continue;const ts=npdGateTasks(p,gi);
     const hasEx=p.gateExit&&p.gateExit[gkey]&&p.gateExit[gkey].length;const hasDl=p.gateDeliv&&p.gateDeliv[gkey]&&p.gateDeliv[gkey].length;

     if(hasEx)blocks+='<h3>Exit criteria</h3>'+_xtbl(['Exit criterion','Met','Owner','Remarks'],exitRows(p,gkey));
     if(hasDl)blocks+='<h3>Deliverables</h3>'+_xtbl(['Document / record','Available','Owner','Attachments','Remarks'],delivRows(p,gkey));

 } else {

     blocks+='<div class="gate"><h2>'+_xe(lbl)+'</h2><h3>Tasks</h3>'+_xtbl(['Task','Activity','Owner','Plan start','Plan end','Actual start','Actual end','Status','%'],ts.map(t=>[t.n,t.name,t.resp,t.planStart,t.planEnd,t.actualStart,t.actualEnd,t.status,(t.pct!=null?t.pct:'')]))+'</div>';});
   ['AB0','AB0.5'].forEach(k=>{const hasEx=p.gateExit&&p.gateExit[k]&&p.gateExit[k].length;const hasDl=p.gateDeliv&&p.gateDeliv[k]&&p.gateDeliv[k].length;if(!hasEx&&!hasDl)return;

     blocks+='</div>';});
 }
 // ---- charter ----
 if(p.charter){const c=p.charter;let cr='';
   Object.keys(c).forEach(k=>{const v=c[k];if(typeof v==='string'&&v.trim()){cr+='<div class="cf"><span>'+_xe(k)+'</span><div>'+_xe(v)+'</div></div>';}});

   if(cr)blocks+='<div class="gate"><h2>Charter</h2>'+cr+'</div>';
 }
 const doc='<!doctype html><html><head><meta charset="utf-8"><title>'+_xe(p.name)+' — Projexa export</title><style>'
  +'*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;margin:0;padding:32px;background:#fff;font-size:13px}'

  +'.noprint{margin-bottom:16px}button{font:inherit;padding:8px 16px;border:none;border-radius:7px;background:#1a1a1a;color:#fff;cursor:pointer}'
  +'@media print{.noprint{display:none}body{padding:0}}'
  +'</style></head><body>'

 const blob=new Blob([doc],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download='Projexa_'+safe+'_'+now.toISOString().slice(0,10)+'.html';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),3000);

 var d2=new Date(v);if(!isNaN(d2)&&/\d/.test(v))return d2.toISOString().slice(0,10);return v;}

   +'<div class="fl"><label>ECN Approved Date</label><input type="date" id="ec-appr" value="'+cl(ecnDateNorm(e.approvedDate))+'"></div></div>'
 +'<div class="fg2"><div class="fl"><label>ECN Planned Date</label><input type="date" id="ec-plan" value="'+cl(ecnDateNorm(e.plannedDate))+'"></div>'
   +'<div class="fl"><label>ECN Implementation Date</label><input type="date" id="ec-impl" value="'+cl(ecnDateNorm(e.implDate))+'"></div></div>'
 +'<div class="fl"><label>BOM part which will change</label><input id="ec-bom" value="'+cl(e.bomPart)+'" placeholder="Part no / description"></div>'
 +'<div class="fg2"><div class="fl"><label>Stock at Line</label><input id="ec-sl" value="'+cl(e.stockLine)+'" placeholder="qty"></div>'
   +'<div class="fl"><label>Stock at store &amp; Supplier</label><input id="ec-ss" value="'+cl(e.stockStore)+'" placeholder="qty"></div></div>'
 +'<div class="fl"><label>New Part Inward Date</label><input type="date" id="ec-inward" value="'+cl(ecnDateNorm(e.newPartInward))+'"></div>'
 +'</div><div class="modal-f"><button class="btn b-gho" onclick="closeModal()">Cancel</button><button class="btn b-pri" onclick="saveEcn('+(i!=null?i:'null')+')">'+(i!=null?'Save':'Add ECN')+'</button></div>');}
function saveEcn(i){const v=id=>{const el=$(id);return el?el.value.trim():'';};
 const obj={ecnNo:v('ec-no'),projCat:v('ec-cat'),proj:v('ec-proj'),status:v('ec-status'),desc:v('ec-desc'),ecrAvail:v('ec-ecr'),creator:v('ec-creator'),ecnDate:v('ec-date'),approvedDate:v('ec-appr'),plannedDate:v('ec-plan'),implDate:v('ec-impl'),bomPart:v('ec-bom'),stockLine:v('ec-sl'),stockStore:v('ec-ss'),newPartInward:v('ec-inward')};
 if(!obj.ecnNo&&!obj.desc){toast('ECN number or description required');return;}
 if(i!=null&&ecns[i]){Object.assign(ecns[i],obj);toast('ECN updated','success');}
 else{obj.id=ecnCtr++;obj.files=[];ecns.push(obj);toast('ECN added','success');}
 saveState();closeModal();render();}
function delEcn(i){if(!ecns[i])return;if(!confirm('Remove ECN '+(ecns[i].ecnNo||'')+'?'))return;ecns.splice(i,1);saveState();render();}
function ecnTemplate(){const h=['Project Category','Project Name','ECN Number','ECN Status','ECN Description','ECR Available','ECN Creator','ECN Date','ECN Approved Date','ECN Planned Date','ECN Implementation Date','BOM part which will change','stock at Line','stock at store & Supplier','New Part Inward Date'];
 const ex=['FAN','Motor Assembly Razon','ECN-1318','Approved','(MOTOR ASSY- RAZON) Drawing realization','Yes (ECR-0644)','Swapnesh Ghadge','26-May-26','23-Jun-26','','','A290501','120','340','15-Jul-26'];
 const csv=h.join(',')+'\n'+ex.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',');
 const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='ECN_Template.csv';document.body.appendChild(a);a.click();a.remove();toast('Template downloaded','success');}
function uploadEcn(){const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.xlsx,.xls';
 inp.onchange=function(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=function(e){try{let rows;
    if(/\.csv$/i.test(f.name)){rows=bomCsvRows(e.target.result);}
    else if(window.XLSX){const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});}
    else{toast('Excel parsing needs internet. Save as CSV and upload that (works offline).','info');return;}
    ecnImportRows(rows);
  }catch(err){toast('Could not read file: '+err.message);}};
  if(/\.csv$/i.test(f.name))rd.readAsText(f);else rd.readAsArrayBuffer(f);};
 inp.click();}
function ecnImportRows(rows){if(!rows||!rows.length){toast('Empty file');return;}
 let hi=rows.findIndex(r=>r&&r.some(c=>/ecn number|ecn no/i.test(String(c||''))));if(hi<0)hi=0;
 const hdr=rows[hi].map(h=>String(h||'').toLowerCase().trim());
 const find=keys=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
 const C={cat:find(['project cat','category']),proj:find(['project name','project']),no:find(['ecn number','ecn no']),status:find(['ecn status','status']),desc:find(['description']),ecr:find(['ecr']),creator:find(['creator']),date:find(['ecn date']),appr:find(['approved']),plan:find(['planned']),impl:find(['implement']),bom:find(['bom part']),sl:find(['stock at line','stock line']),ss:find(['store','supplier']),inward:find(['inward'])};
 const normSt=s=>{s=(s||'').toLowerCase();return s.includes('approv')&&!s.includes('under')?'Approved':s.includes('under')?'Under Approval':s.includes('implement')?'Implemented':s.includes('reject')?'Rejected':s.includes('hold')?'On Hold':s?'Under Approval':'Draft';};
 let added=0;
 for(let r=hi+1;r<rows.length;r++){const row=rows[r];if(!row)continue;const g=i=>i>=0?String(row[i]||'').trim():'';
   if(!g(C.no)&&!g(C.desc))continue;
   ecns.push({id:ecnCtr++,ecnNo:g(C.no),projCat:g(C.cat),proj:g(C.proj),status:normSt(g(C.status)),desc:g(C.desc),ecrAvail:g(C.ecr),creator:g(C.creator),ecnDate:ecnDateNorm(g(C.date)),approvedDate:ecnDateNorm(g(C.appr)),plannedDate:ecnDateNorm(g(C.plan)),implDate:ecnDateNorm(g(C.impl)),bomPart:g(C.bom),stockLine:g(C.sl),stockStore:g(C.ss),newPartInward:ecnDateNorm(g(C.inward)),files:[]});added++;}
 saveState();render();toast(added+' ECNs imported','success');}

rfqCounter=1;npdCounter=1;bomIdCtr=1;lineIdCtr=1;reviewCtr=1;actionCtr=1;pocCounter=1;invCtr=1;npbCtr=1;sampleCtr=1;stdDocCtr=1;ecnCtr=1;trialCtr=1;

function runSplash(){
 var s=document.getElementById('splash');if(!s)return;
 var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
 if(reduce)s.classList.add('reduce');
 var done=false;
 function finish(){if(done)return;done=true;s.classList.add('out');setTimeout(function(){s.style.display='none';},reduce?320:540);}
 var t=setTimeout(finish,reduce?550:2050);
 s.addEventListener('click',function(){clearTimeout(t);finish();});
 window.addEventListener('keydown',function h(){window.removeEventListener('keydown',h);clearTimeout(t);finish();});
}
function toggleSidebar(){
 const a=document.querySelector('.app');
 const pinned=!a.classList.contains('pinned');
 a.classList.toggle('pinned',pinned);
 a.classList.toggle('autohide',!pinned);
 if(!pinned){const sb=document.querySelector('.sb');if(sb)sb.classList.remove('expanded');}
 try{localStorage.setItem('projexaSbPinned',pinned?'1':'0');}catch(e){}
}
function initSidebarAutoHide(){
 const a=document.querySelector('.app');
 let pinned=false;try{pinned=localStorage.getItem('projexaSbPinned')==='1';}catch(e){}
 a.classList.toggle('pinned',pinned);
 a.classList.toggle('autohide',!pinned);
 const sb=document.querySelector('.sb');
 if(!sb)return;
 let leaveTimer=null;
 sb.addEventListener('mouseenter',function(){if(!a.classList.contains('autohide'))return;clearTimeout(leaveTimer);sb.classList.add('expanded');});
 sb.addEventListener('mouseleave',function(){if(!a.classList.contains('autohide'))return;leaveTimer=setTimeout(()=>sb.classList.remove('expanded'),220);});
}
(function(){try{initSidebarAutoHide();}catch(e){}})();
runSplash();
