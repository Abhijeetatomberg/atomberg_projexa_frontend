<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atomberg Projexa — Project Tracking Suite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#2563eb;--acc-d:#1d4ed8;--acc-l:#eff6ff;
  --brand:#FFC627;
  --sb:#0c1526;--sb2:#111e33;--sb3:#1a2d4a;
  --bg:#f5f6f8;--card:#ffffff;--card2:#fafbfc;
  --t1:#111827;--t2:#6b7280;--t3:#9ca3af;
  --bd:#e8eaed;--bd2:#d8dbe0;
  --green:#059669;--greenT:#d1fae5;--greenS:#ecfdf5;
  --amber:#d97706;--amberT:#fef3c7;--amberS:#fffbeb;
  --red:#dc2626;--redT:#fee2e2;--redS:#fef2f2;
  --purple:#7c3aed;--purpleT:#ede9fe;
  --pink:#db2777;--pinkT:#fce7f3;
  --cyan:#0891b2;--cyanT:#cffafe;
  --blue:#2563eb;--blueT:#dbeafe;
  --r:10px;--rsm:8px;--rlg:14px;
  --sh:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
  --sh2:0 4px 12px rgba(16,24,40,.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* ───── SIDEBAR ───── */
.sb{width:228px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden auto;transition:width .22s ease}
.sb-brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sb3)}
.sb-logo{width:34px;height:34px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#1a1a1a;font-weight:900;font-size:18px;flex-shrink:0;font-family:Arial,sans-serif}
.sb-brand .bn{font-size:14px;font-weight:700;color:#f9fafb;line-height:1.1}
.sb-brand .bs{font-size:10px;color:#64748b;margin-top:2px}
.sb-logo-mark{width:34px;height:34px;border-radius:50%;flex:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav{padding:12px 12px}
.ni{display:flex;align-items:center;gap:11px;padding:7px 10px;border-radius:var(--rsm);cursor:pointer;margin-bottom:2px;transition:background .12s;position:relative}
.ni:hover{background:var(--sb2)}
.ni.on{background:var(--sb3)}
.ni.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--brand)}
.ni-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni-ic svg{width:15px;height:15px}
.ni .lbl{font-size:12.5px;color:#cbd5e1;font-weight:500;white-space:nowrap;opacity:1;transition:opacity .15s}
.ni.on .lbl{color:#fff}
.ni .chev{margin-left:auto;color:#475569;font-size:11px;display:none}
.ni.on .chev{display:block;color:#94a3b8}

/* ───── SIDEBAR AUTO-HIDE ───── */
.app.autohide .sb{width:60px}
.app.autohide .sb .lbl,.app.autohide .sb .bn,.app.autohide .sb .bs,.app.autohide .sb .chev{opacity:0;pointer-events:none;position:absolute}
.app.autohide .sb .sb-brand{justify-content:center}
.app.autohide .sb.expanded{position:fixed;top:0;left:0;height:100vh;width:228px;z-index:60;box-shadow:6px 0 28px rgba(0,0,0,.28)}
.app.autohide .sb.expanded .lbl,.app.autohide .sb.expanded .bn,.app.autohide .sb.expanded .bs,.app.autohide .sb.expanded .chev{opacity:1;pointer-events:auto;position:static}
.app.autohide .sb.expanded .sb-brand{justify-content:flex-start}

/* ───── MAIN ───── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:48px;flex-shrink:0;display:flex;align-items:center;border-bottom:1px solid var(--bd);background:var(--card)}
.sbtoggle{margin-left:12px;width:34px;height:34px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);flex:none;transition:background .12s}
.sbtoggle:hover{background:var(--card2);color:var(--t1)}
.crumb{flex:1;display:flex;align-items:center;gap:8px;padding:0 16px;font-size:12px;color:var(--t2)}
.syncchip{display:flex;align-items:center;gap:7px;margin:0 14px 0 8px;padding:5px 12px;border:1px solid var(--bd);border-radius:20px;background:var(--card);font-size:11.5px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;flex:none}
.userbox{display:flex;align-items:center;gap:9px;flex:none;padding-right:6px}
.userbox .ub-av{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:none}
.userbox .ub-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.1}
.userbox .ub-role{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;line-height:1.2}
.ub-out{background:var(--card2);border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--t2);margin-left:4px}
.ub-out:hover{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
#login{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;background:radial-gradient(900px 520px at 50% 42%,#16335f 0%,#0c1526 72%);padding:20px}
body.locked #login{display:flex}
body.locked .app{display:none}
.lg-card{width:368px;max-width:100%;background:var(--card);border-radius:18px;padding:34px 30px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
.lg-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.lg-badge{width:44px;height:44px;border-radius:12px;background:#FDB913;display:flex;align-items:center;justify-content:center;font-weight:800;color:#1A1A1A;font-size:20px;flex:none}
.lg-logo h2{margin:0;font-size:19px;color:var(--t1)}.lg-logo p{margin:1px 0 0;font-size:11px;color:var(--t3)}
.lg-f{margin-bottom:14px}
.lg-f label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px}
.lg-f input{width:100%;border:1px solid var(--bd);border-radius:9px;padding:11px 12px;font-size:13px;background:var(--card2);color:var(--t1)}
.lg-f input:focus{border-color:var(--acc);outline:none;background:var(--card)}
.lg-btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;margin-top:8px}
.lg-btn:hover{filter:brightness(1.06)}
.lg-err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:8px;padding:9px 11px;font-size:12px;margin-bottom:14px;display:none}
.lg-err.show{display:block}
.lg-hint{font-size:10.5px;color:var(--t3);text-align:center;margin-top:18px;line-height:1.6}
/* ── Executive Gantt ── */
.gantt{border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--card)}
.gantt-scroll{overflow-x:auto}
.gantt-inner{min-width:780px}
.gantt-head{display:grid;grid-template-columns:212px 1fr;border-bottom:1px solid var(--bd);background:var(--card2)}
.gantt-head .gh-l{padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3);letter-spacing:.4px;align-self:center}
.gantt-months{position:relative;height:34px}
.gantt-mo{position:absolute;top:0;bottom:0;border-left:1px solid var(--bd);font-size:9px;color:var(--t3);font-weight:700;padding:11px 0 0 5px;white-space:nowrap;overflow:hidden}
.gantt-row{display:grid;grid-template-columns:212px 1fr;border-bottom:1px solid var(--bd)}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:#fafbfc}
.grl{padding:8px 12px;cursor:pointer;border-right:1px solid var(--bd)}
.grl-name{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grl-name .gdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.grl-sub{font-size:9px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grt{position:relative;height:46px}
.gantt-grid i{position:absolute;top:0;bottom:0;border-left:1px solid #f4f6f8}
.gbar{position:absolute;top:13px;height:20px;border-radius:6px;overflow:hidden;display:flex;box-shadow:0 1px 2px rgba(0,0,0,.12);min-width:3px}
.gseg{height:100%;border-right:1px solid rgba(255,255,255,.5)}
.gseg:last-child{border-right:none}
.gbar-lbl{position:absolute;top:15px;font-size:9px;font-weight:700;color:var(--t2);white-space:nowrap;pointer-events:none}
.gtoday{position:absolute;top:0;bottom:0;width:2px;background:#dc2626;z-index:4}
.gtoday b{position:absolute;top:1px;left:3px;font-size:7.5px;color:#dc2626;font-weight:800;background:var(--card);padding:0 2px;border-radius:2px}
.gantt-legend{display:flex;gap:14px;flex-wrap:wrap;padding:9px 12px;border-top:1px solid var(--bd);font-size:10px;color:var(--t2);align-items:center}
.gantt-legend span i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
.gantt-empty{padding:34px;text-align:center;color:var(--t3);font-size:12px}
.gtab{display:inline-flex;gap:5px}
.gtab button{font-size:11px;padding:5px 13px;border:1px solid var(--bd);background:var(--card);border-radius:7px;cursor:pointer;color:var(--t2);font-weight:600}
.gtab button.on{background:var(--acc);color:#fff;border-color:var(--acc)}
/* horizontal bar chart */
.hbar-row{display:grid;grid-template-columns:150px 1fr 52px;align-items:center;gap:10px;padding:5px 0}
.hbar-lbl{font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-tk{height:16px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.hbar-fl{height:100%;border-radius:6px;min-width:2px}
.hbar-val{font-size:11px;font-weight:700;text-align:right;color:var(--t1)}
.syncchip:hover{border-color:var(--acc)}
.syncchip .scd{width:8px;height:8px;border-radius:50%;background:#94a3b8;flex:none}
.syncchip.sc-synced{color:#047857;border-color:#a7f3d0;background:#ecfdf5}.syncchip.sc-synced .scd{background:#059669}
.syncchip.sc-saving{color:#b45309;border-color:#fde68a;background:#fffbeb}.syncchip.sc-saving .scd{background:#f59e0b}
.syncchip.sc-warn{color:#b45309;border-color:#fde68a;background:#fffbeb}.syncchip.sc-warn .scd{background:#f59e0b}
.syncchip.sc-error{color:#b91c1c;border-color:#fecaca;background:#fef2f2}.syncchip.sc-error .scd{background:#dc2626}
.dm-note{font-size:12.5px;color:var(--t2);line-height:1.6;margin-bottom:12px}
.dm-steps{font-size:12px;color:var(--t2);line-height:1.7;background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:11px 13px;margin-bottom:14px}
.dm-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dm-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
.dm-row .scd{width:9px;height:9px;border-radius:50%}
.dm-warn{font-size:12.5px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:11px 13px;line-height:1.6}
.crumb b{color:var(--t1);font-weight:600}
.crumb .sep{color:var(--t3)}
.scroll{flex:1;overflow-y:auto;padding:22px 24px 60px}

/* ───── PAGE HEADER ───── */
.phead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.phead h1{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.phead .sub{font-size:12.5px;color:var(--t2);margin-top:3px}
.phead .acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ───── BUTTONS ───── */
.btn{border:none;padding:8px 15px;border-radius:var(--rsm);font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap;font-family:inherit}
.btn svg{width:15px;height:15px}
.b-pri{background:var(--acc);color:#fff}.b-pri:hover{background:var(--acc-d)}
.b-gho{background:var(--card);color:var(--t1);border:1px solid var(--bd2)}.b-gho:hover{background:var(--card2);border-color:var(--t3)}
.b-sm{padding:6px 12px;font-size:12px}
.icobtn{width:34px;height:34px;border:1px solid var(--bd2);background:var(--card);border-radius:var(--rsm);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2)}
.icobtn.on{background:var(--acc-l);border-color:var(--acc);color:var(--acc)}
.icobtn svg{width:16px;height:16px}

/* ───── STAT TILES ───── */
.stats{display:grid;gap:14px;margin-bottom:18px}
.stats.c4{grid-template-columns:repeat(4,1fr)}
.stats.c6{grid-template-columns:repeat(6,1fr)}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);padding:16px 16px;box-shadow:var(--sh);position:relative}
.stat.hl{border-width:1.5px}
.stat .top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.stat .ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat .ico svg{width:19px;height:19px}
.stat .lbl{font-size:11.5px;color:var(--t2);font-weight:500}
.stat .val{font-size:27px;font-weight:700;color:var(--t1);line-height:1.1;margin-top:2px;letter-spacing:-.5px}
.stat .cap{font-size:10.5px;color:var(--t3);margin-top:8px}
.stat .bar{height:5px;border-radius:5px;background:var(--bd);margin-top:10px;overflow:hidden}
.stat .bar > i{display:block;height:100%;border-radius:5px}
.stat .pills{display:flex;gap:6px;margin-top:9px}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}

/* ───── CARDS ───── */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);box-shadow:var(--sh);margin-bottom:16px}
.card-h{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-h .ct{font-size:13.5px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.card-h .ct svg{width:16px;height:16px;color:var(--acc)}
.card-h .cl{font-size:12px;color:var(--acc);font-weight:600;cursor:pointer}
.card-b{padding:16px 18px}

/* ───── PIPELINE BAR ───── */
.pipebar{height:9px;border-radius:9px;display:flex;overflow:hidden;background:var(--bd)}
.pipebar > span{height:100%}
.pipelegend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.pipelegend .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--t2)}
.pipelegend .lg b{color:var(--t1)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ───── CHIPS ───── */
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--bd2);background:var(--card);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .12s}
.chip:hover{border-color:var(--t3)}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.chip .cnt{background:var(--bd);color:var(--t2);border-radius:12px;font-size:10.5px;padding:1px 7px;font-weight:700}
.chip.on .cnt{background:rgba(255,255,255,.25);color:#fff}

/* ───── TOOLBAR ───── */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;position:relative}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t3)}
.search input{width:100%;padding:9px 13px 9px 37px;border:1px solid var(--bd2);border-radius:var(--rsm);font-size:12.5px;background:var(--card);color:var(--t1);font-family:inherit}
.search input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.fsel{padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--rsm);font-size:12.5px;background:var(--card);color:var(--t1);font-family:inherit;cursor:pointer;min-width:130px}
select.fsel:focus{outline:none;border-color:var(--acc)}

/* ───── TABLE ───── */
.tblwrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:560px}
.tbl th{padding:10px 14px;font-size:10.5px;font-weight:700;color:var(--t2);background:var(--card2);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--t1);vertical-align:middle;white-space:nowrap}
.tbl tbody tr{cursor:pointer}
.tbl tbody tr:hover td{background:var(--card2)}
.tbl .grp{background:var(--blueT);color:var(--blue)!important}
.lnk{color:var(--acc);font-weight:600}
.mut{color:var(--t2)}

/* ───── BADGES ───── */
.badge{font-size:10.5px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bg-green{background:var(--greenT);color:var(--green)}
.bg-amber{background:var(--amberT);color:var(--amber)}
.bg-red{background:var(--redT);color:var(--red)}
.bg-blue{background:var(--blueT);color:var(--blue)}
.bg-purple{background:var(--purpleT);color:var(--purple)}
.bg-pink{background:var(--pinkT);color:var(--pink)}
.bg-gray{background:#f1f3f5;color:var(--t2)}

/* ───── DASH HERO ───── */
.hero{border-radius:var(--rlg);background:linear-gradient(120deg,#0c1526 0%,#16335f 55%,#2563eb 130%);color:#fff;padding:24px 26px;display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:16px;box-shadow:var(--sh2)}
.hero .eyebrow{display:inline-block;background:rgba(255,255,255,.14);color:#fff;font-size:10.5px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.4px}
.hero h1{font-size:26px;font-weight:700;margin:12px 0 7px;letter-spacing:-.4px}
.hero p{font-size:12.5px;color:rgba(255,255,255,.78);max-width:440px;line-height:1.55}
.hero-mini{display:flex;gap:14px;flex-wrap:wrap}
.hmini{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:12px 16px;min-width:120px}
.hmini .l{font-size:10.5px;color:rgba(255,255,255,.7);font-weight:600}
.hmini .v{font-size:23px;font-weight:700;margin:3px 0}
.hmini .c{font-size:9.5px;color:rgba(255,255,255,.6);line-height:1.4}
.focus{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;box-shadow:var(--sh)}
.focus .ft{font-size:13.5px;font-weight:700}
.focus .fs{font-size:11.5px;color:var(--t2);margin-top:2px}

/* ───── NPD CARDS ───── */
.pcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.pcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);padding:16px;cursor:pointer;box-shadow:var(--sh);transition:all .12s}
.pcard:hover{border-color:var(--acc);box-shadow:var(--sh2)}
.pcard .pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.pcard .pc-id{font-size:10.5px;color:var(--t3);font-weight:600}
.pcard .pc-name{font-size:14.5px;font-weight:700;margin:1px 0 3px}
.pcard .pc-meta{font-size:11.5px;color:var(--t2);display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:10px}
.pcard .pc-prog{height:6px;border-radius:6px;background:var(--bd);overflow:hidden;margin-top:auto}
.pcard .pc-prog > i{display:block;height:100%;background:var(--acc);border-radius:6px}
.pcard .pc-pct{font-size:10.5px;color:var(--t3);margin-top:5px;display:flex;justify-content:space-between}

/* ───── STEPPER ───── */
.stepper{display:flex;align-items:flex-start;justify-content:space-between;position:relative;margin-top:14px}
.stepper::before{content:"";position:absolute;top:15px;left:3%;right:3%;height:3px;background:var(--bd);z-index:0}
.step{display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;z-index:1;flex:1}
.step .node{width:31px;height:31px;border-radius:50%;background:var(--card);border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3)}
.step.done .node{background:var(--greenS);border-color:var(--green);color:var(--green)}
.step.cur .node{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 0 0 4px var(--acc-l)}
.step .sl{font-size:10.5px;color:var(--t2);font-weight:600;text-align:center}
.step.cur .sl{color:var(--acc)}
.step svg{width:15px;height:15px}

/* ───── TABS ───── */
.tabs{display:flex;border-bottom:1px solid var(--bd);gap:2px;overflow-x:auto;margin-bottom:18px}
.tab{padding:11px 16px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab svg{width:15px;height:15px}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ───── ACCORDION ───── */
.acc{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.acc-h{padding:13px 18px;display:flex;align-items:center;gap:13px;cursor:pointer}
.acc-h .acnt{width:26px;height:26px;border-radius:7px;background:var(--card2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2)}
.acc-h .an{font-size:13px;font-weight:700}
.acc-h .as{font-size:11px;color:var(--t2);margin-top:1px}
.acc-h .aprog{margin-left:auto;display:flex;align-items:center;gap:10px;min-width:160px}
.acc-h .aprog .ab{flex:1;height:6px;border-radius:6px;background:var(--bd);overflow:hidden}
.acc-h .aprog .ab > i{display:block;height:100%;background:var(--green);border-radius:6px}
.acc-h .aprog .ap{font-size:11px;font-weight:700;color:var(--t2);width:34px;text-align:right}
.acc-b{border-top:1px solid var(--bd);padding:4px 0}
.acc-row{padding:10px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.acc-row:last-child{border-bottom:none}
.acc-row .arn{font-size:12.5px;font-weight:600}
.acc-row .ars{font-size:11px;color:var(--t2)}
.acc-empty{padding:22px;text-align:center;color:var(--t3);font-size:12px}

/* ───── RESOURCE / DEPT ───── */
.deptgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.deptc{border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;background:var(--card)}
.deptc .dn{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.deptc .dv{font-size:22px;font-weight:700;margin:6px 0 2px}
.deptc .du{font-size:10px;color:var(--t3)}
.deptc .db{height:5px;border-radius:5px;background:var(--bd);margin-top:7px;overflow:hidden}
.deptc .db > i{display:block;height:100%;border-radius:5px;background:var(--acc)}
.rescards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
.resc{border:1px solid var(--bd);border-radius:var(--r);padding:15px;background:var(--card);box-shadow:var(--sh)}
.resc .rt{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.resc .rn{font-size:13px;font-weight:700}
.resc .rr{font-size:11px;color:var(--t2)}
.resc .rrow{display:flex;justify-content:space-between;font-size:11.5px;margin-top:7px;color:var(--t2)}
.resc .rrow b{color:var(--t1)}
.resc .rb{height:5px;border-radius:5px;background:var(--bd);margin-top:4px;overflow:hidden}
.resc .rb > i{display:block;height:100%;border-radius:5px}

/* ───── BAR CHART ───── */
.barchart{display:flex;flex-direction:column;gap:11px}
.barrow{display:grid;grid-template-columns:84px 1fr;gap:10px;align-items:center}
.barrow .bl{font-size:11.5px;color:var(--t2);font-weight:600;text-align:right}
.barrow .bset{display:flex;flex-direction:column;gap:3px}
.barrow .bseg{height:9px;border-radius:5px}
.projbudget{display:flex;flex-direction:column;gap:13px}
.pbrow .pbtop{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.pbrow .pbn{font-weight:600}
.pbrow .pbid{font-size:10px;color:var(--t3)}
.pbrow .pbar{height:7px;border-radius:7px;background:var(--bd);overflow:hidden}
.pbrow .pbar > i{display:block;height:100%;border-radius:7px;background:var(--acc)}

/* ───── DASH GRID ───── */
.dgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.gatebars{display:flex;flex-direction:column;gap:9px}
.gatebar{display:flex;align-items:center;gap:10px;font-size:11.5px}
.gatebar .gn{width:130px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gatebar .gt{flex:1;height:7px;background:var(--bd);border-radius:7px;overflow:hidden}
.gatebar .gt > i{display:block;height:100%;background:var(--acc);border-radius:7px}
.gatebar .gp{width:34px;text-align:right;color:var(--t3);font-weight:600}
.risk{display:flex;flex-direction:column;gap:0}
.riskrow{padding:10px 0;border-bottom:1px solid var(--bd);border-left:3px solid var(--amber);padding-left:11px}
.riskrow.r-red{border-left-color:var(--red)}
.riskrow:last-child{border-bottom:none}
.riskrow .rkn{font-size:12px;font-weight:600}
.riskrow .rkd{font-size:11px;color:var(--t2)}
.act{display:flex;flex-direction:column;gap:0}
.actrow{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--bd)}
.actrow:last-child{border-bottom:none}
.actrow .ad{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.actrow .at{font-size:12px}.actrow .at b{font-weight:600}
.actrow .am{font-size:10.5px;color:var(--t2);margin-top:1px}

/* ───── METRICS (npd overview) ───── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.metc{border:1px solid var(--bd);border-radius:var(--r);padding:16px;background:var(--card)}
.metc .ml{font-size:11.5px;color:var(--t2);font-weight:600}
.metc .mv{font-size:23px;font-weight:700;margin-top:8px}
.metc .mc{font-size:10.5px;color:var(--t3);margin-top:2px}

/* ───── MODAL ───── */
.mbg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.mbg.show{display:flex}
.modal{background:var(--card);border-radius:var(--rlg);width:460px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-h .mt{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px}
.modal-h .mt svg{width:18px;height:18px;color:var(--acc)}
.modal-h .mx{cursor:pointer;color:var(--t3);font-size:20px;line-height:1}
.modal-b{padding:18px 22px}
.modal-f{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:9px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px}
.fl input,.fl select,.fl textarea{width:100%;padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--rsm);font-size:12.5px;background:var(--card);color:var(--t1);font-family:inherit}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fl textarea{resize:vertical;min-height:64px;line-height:1.5}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:0 13px}
.tform-wrap{max-width:840px;margin:0 auto}
.tform{width:100%;border-collapse:collapse;border:2px solid #1a1a1a;background:#fff}
.tform td{border:1px solid #d0d5dd;padding:7px 10px;vertical-align:top}
.tform .sec{background:#eef1f5;text-align:center;font-weight:700;padding:6px;font-size:12px;color:#1a1a1a;letter-spacing:.01em}
.tform .lbl{font-weight:600;font-size:10.5px;color:#475467;display:block;margin-bottom:3px}
.tform input,.tform select,.tform textarea{width:100%;border:none;background:transparent;font-size:12.5px;padding:1px 0;font-family:inherit;color:#1a1a1a}
.tform input:disabled,.tform select:disabled,.tform textarea:disabled{color:#1a1a1a;background:transparent;opacity:1;-webkit-text-fill-color:#1a1a1a}
.tform input:not(:disabled):focus,.tform select:not(:disabled):focus,.tform textarea:not(:disabled):focus{outline:2px solid var(--acc);border-radius:3px}
.tform textarea{resize:vertical;min-height:30px}
.tform .tall textarea{min-height:64px}
.tform-hdr{width:100%;border-collapse:collapse;border:2px solid #1a1a1a;margin-bottom:0}
.tform-hdr td{border:none;vertical-align:middle;padding:7px 11px}
.tform-title{font-size:15.5px;font-weight:800;text-align:center}
.tform-meta{font-size:9.5px;text-align:right;line-height:1.5;white-space:nowrap;color:#475467}
.cbrow{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;margin-top:2px}
.cbopt{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12.5px;color:#1a1a1a}
.cbopt input{width:auto!important;cursor:pointer}
.cbopt.dis{cursor:default;color:#98a2b3}
.ai-msg{display:flex;margin-bottom:12px}
.ai-msg.ai-user{justify-content:flex-end}
.ai-msg.ai-bot{justify-content:flex-start}
.ai-bubble{max-width:72%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;white-space:normal}
.ai-user .ai-bubble{background:var(--acc);color:#fff;border-bottom-right-radius:3px}
.ai-bot .ai-bubble{background:#f1f3f5;color:#1a1a1a;border-bottom-left-radius:3px}
.ai-typing{color:#94a3b8;font-style:italic}
.ai-fab{position:fixed;right:22px;bottom:22px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#e11d48,#7c3aed);color:#fff;border:none;box-shadow:0 6px 20px rgba(124,58,237,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:70;transition:transform .15s}
.ai-fab:hover{transform:scale(1.08)}
.ai-float-panel{position:fixed;right:22px;bottom:86px;width:360px;max-height:min(70vh,560px);background:var(--card);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);border:1px solid var(--bd);z-index:70;display:flex;flex-direction:column;overflow:hidden}
.ai-float-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bd);font-weight:700;font-size:13px;background:linear-gradient(135deg,#e11d4811,#7c3aed11)}
.ai-float-hdr .mx{cursor:pointer;color:var(--t2);font-size:16px;line-height:1}
.ai-float-log{flex:1;overflow-y:auto;padding:12px 14px}
.ai-float-inputrow{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--bd)}
.ai-float-inputrow input{flex:1;border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font-size:12.5px}
@media (max-width:480px){.ai-float-panel{right:10px;left:10px;width:auto;bottom:78px}.ai-fab{right:16px;bottom:16px}}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.home-tile{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);padding:18px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
.home-tile:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.08);border-color:transparent}
.home-tile-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.home-tile-ic svg{width:21px;height:21px}
.home-tile-lbl{font-size:13.5px;font-weight:700;color:var(--t1);margin-bottom:3px}
.home-tile-desc{font-size:11px;color:var(--t3);line-height:1.4}

/* ───── DETAIL HEADER (rfq/npd) ───── */
.dethead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.dethead .back{cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;white-space:nowrap}
.dethead .back svg{transform:rotate(180deg);width:15px;height:15px}
.dethead h1{font-size:21px;font-weight:700;display:flex;align-items:center;gap:11px}
.dethead .dsub{font-size:12px;color:var(--t2);margin-top:3px}
.detbox{border:1px solid var(--bd);border-radius:var(--rlg);padding:16px 18px;background:var(--card);margin-bottom:16px;box-shadow:var(--sh)}
.wfbanner{border-radius:var(--rlg);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;color:#fff;flex-wrap:wrap}
.wfbanner p{font-size:13.5px;font-weight:600}
.wfbanner small{font-size:11px;opacity:.85;display:block;margin-top:2px}

.df-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.df label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.df p{font-size:12.5px}
.df.full{grid-column:1/-1}

/* ───── TOAST ───── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--t1);color:#fff;padding:11px 20px;border-radius:var(--r);font-size:12.5px;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:200;box-shadow:var(--sh2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.info{background:var(--acc)}

.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px}
.ring{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

@media(max-width:1100px){.stats.c6{grid-template-columns:repeat(3,1fr)}.stats.c4{grid-template-columns:repeat(2,1fr)}.deptgrid{grid-template-columns:repeat(3,1fr)}.dgrid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}

/* ───── NPD MODULE ───── */
.charter-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.charter-grid .fl.full{grid-column:1/-1}
.gtask{display:flex;align-items:center;gap:11px;padding:9px 18px;border-bottom:1px solid var(--bd)}
.gtask:last-child{border-bottom:none}
.gtask input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.gtask .gtnum{font-size:10px;color:var(--t3);width:42px;flex-shrink:0;font-weight:600}
.gtask .gtn{flex:1;font-size:12.5px}
.gtask.done .gtn{color:var(--t3);text-decoration:line-through}
.gtask .gtd{font-size:10.5px;color:var(--t3);white-space:nowrap}
.taskstatus{padding:5px 8px;border:1px solid var(--bd2);border-radius:6px;font-size:11.5px;font-family:inherit;background:var(--card);color:var(--t1);cursor:pointer}
.teamrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.teamrow:last-child{border-bottom:none}
.gtdate{color:var(--t3)!important;min-width:148px;text-align:right}
.tl{display:flex;flex-direction:column;gap:9px}
.tl-row{display:grid;grid-template-columns:64px 1fr 170px;align-items:center;gap:10px}
.tl-label{font-size:11.5px;font-weight:700;color:var(--t2)}
.tl-track{position:relative;height:22px;background:var(--card2);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.tl-bar{position:absolute;top:3px;bottom:3px;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;min-width:16px}
.tl-pct{font-size:9px;color:#fff;font-weight:700;padding-right:5px}
.tl-now{position:absolute;top:0;bottom:0;width:2px;background:repeating-linear-gradient(180deg,#111827,#111827 3px,transparent 3px,transparent 6px);z-index:2}
.tl-dates{font-size:10.5px;color:var(--t2);text-align:right;white-space:nowrap}
.tl-track2{height:28px}
.tl-plan{top:5px!important;bottom:auto!important;height:8px;background:#cbd5e1}
.tl-actual{bottom:5px!important;top:auto!important;height:8px}
.gpd{padding:5px 6px;border:1px solid var(--bd2);border-radius:6px;font-size:11px;font-family:inherit;background:var(--card);color:var(--t1);width:128px}
.gpd.gpr{width:118px}
.bom-prog{display:flex;align-items:center;gap:7px;min-width:90px}
.bom-prog-b{flex:1;height:6px;background:var(--card2);border:1px solid var(--bd);border-radius:4px;overflow:hidden}
.bom-prog-b i{display:block;height:100%;background:var(--acc);border-radius:4px}
.bom-prog span{font-size:10.5px;font-weight:700;color:var(--t2);width:30px;text-align:right}
.bomtbl th,.bomtbl td{padding:8px 10px;font-size:11.5px}
.bomtbl tbody tr:hover{background:var(--card2)}
.bom-sec{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.bom-sec:first-child{margin-top:0}
.ms-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle;background:var(--t3)}
.ms-ok{background:var(--green)}.ms-late{background:var(--red)}.ms-overdue{background:#f59e0b}.ms-pending{background:var(--acc)}.ms-none{background:#cbd5e1}
/* BOM home charts */
.dleg{display:flex;flex-direction:column;gap:9px}
.dleg .dl{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--t2)}
.dleg .dl span{width:13px;height:13px;border-radius:4px}
.dleg .dl b{color:var(--t1)}
.pl{display:flex;flex-direction:column;gap:6px}
.pl-row{display:grid;grid-template-columns:178px 1fr 34px;align-items:center;gap:10px}
.pl-lbl{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-track{height:13px;background:var(--card2);border:1px solid var(--bd);border-radius:7px;overflow:hidden}
.pl-fill{height:100%;border-radius:7px}
.st2-design{background:#2563eb}.st2-tool{background:#d97706}.st2-val{background:#059669}
.pl-val{font-size:11px;font-weight:700;color:var(--t2);text-align:right}
.fpb{display:grid;grid-template-columns:160px 1fr 50px;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--bd)}
.fpb:last-child{border-bottom:none}
.fpb-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fpb-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--card2)}
.fpb-bar span{display:block;height:100%}
.fpb-meta{font-size:11px;font-weight:700;color:var(--t2);text-align:right}
.fpb-name.cur{color:var(--purple)}
/* ── POC overview dashboard widgets ── */
.mpill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
.attn-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 8px;border-radius:8px;cursor:pointer;transition:background .12s}
.attn-row:hover{background:var(--card2)}
.attn-row+.attn-row{border-top:1px solid var(--bd)}
.attn-main{display:flex;align-items:center;gap:9px;min-width:0}
.attn-no{font-size:10.5px;font-weight:700;color:var(--t3);background:var(--card2);border:1px solid var(--bd);border-radius:5px;padding:1px 6px;flex-shrink:0}
.attn-name{font-size:12.5px;color:var(--t1);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attn-side{display:flex;align-items:center;gap:8px;flex-shrink:0}
.attn-owner{font-size:10.5px;color:var(--t2);background:var(--card2);border:1px solid var(--bd);border-radius:5px;padding:1px 7px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.attn-owner.mut{color:var(--t3);font-style:italic}
.attn-proj{font-size:10px;color:var(--purple);font-weight:600;white-space:nowrap}

function gateObj(kind,pid){return (kind==='poc'?pocs:npds).find(x=>x.id===pid);}
function ensureGateLists(o,keys){if(!o.gateExit)o.gateExit={};if(!o.gateDeliv)o.gateDeliv={};
 keys.forEach(k=>{if(!o.gateExit[k])o.gateExit[k]=(GATE_EXIT[k]||[]).map(x=>({t:x.t,fn:x.fn,met:false,owner:'',rem:''}));
  if(!o.gateDeliv[k])o.gateDeliv[k]=(GATE_DELIV[k]||[]).map(x=>({d:x.d,fn:x.fn,avail:false,owner:'',rem:'',files:[]}));});}
function geMet(o,key){return o.gateExit&&o.gateExit[key]?o.gateExit[key].filter(x=>x.met).length:0;}
function geTot(key){return (GATE_EXIT[key]||[]).length;}
function gdRdy(o,key){return o.gateDeliv&&o.gateDeliv[key]?o.gateDeliv[key].filter(x=>x.avail).length:0;}
function gdTot(key){return (GATE_DELIV[key]||[]).length;}
function exitBlock(kind,pid,key){const o=gateObj(kind,pid);if(!o||!GATE_EXIT[key])return '';ensureGateLists(o,[key]);const list=o.gateExit[key];const met=list.filter(x=>x.met).length;
 const rows=list.map((e,i)=>'<tr>'
   +'<td style="text-align:center"><input type="checkbox" '+(e.met?'checked':'')+' onchange="toggleGE(\''+kind+'\',\''+pid+'\',\''+key+'\','+i+',this.checked)"></td>'
   +'<td class="actcell">'+esc(e.t)+(e.fn?' <span class="mut" style="font-size:10px">['+esc(e.fn)+']</span>':'')+'</td>'
   +'<td><select class="gpd gpr" onchange="setGE(\''+kind+'\',\''+pid+'\',\''+key+'\','+i+',\'owner\',this.value)">'+ownerOpts(e.owner)+'</select></td>'
   +'<td><input class="gpd" value="'+esc(e.rem||'')+'" placeholder="—" onchange="setGE(\''+kind+'\',\''+pid+'\',\''+key+'\','+i+',\'rem\',this.value)"></td></tr>').join('');
 return '<div class="gate-sub"><div class="gate-sub-h">'+svg(I.check)+'Exit criteria <span class="gsc '+(met===list.length&&list.length?'full':(met?'part':''))+'">'+met+'/'+list.length+' met</span></div>'
  +'<div class="tblwrap"><table class="tbl gatetbl" style="min-width:780px"><thead><tr><th style="width:48px">Met</th><th>Exit criterion (gate-pass condition)</th><th style="width:150px">Owner</th><th>Remarks</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}

 const rows=list.map((d,i)=>{const files=(d.files||[]).map((fl,fi)=>'<span class="chip-file">'+svg(I.doc)+'<span class="cf-open" onclick="openDelivFile(\''+kind+'\',\''+pid+'\',\''+key+'\','+i+','+fi+')">'+esc(fl.name)+'</span>'+(fl.id?'<span class="cf-tag">Uploaded</span>':(fl.link?'<span class="cf-tag" style="background:#dbeafe;color:#1e40af">link</span>':''))+'<span class="xf" onclick="delDelivFile(\''+kind+'\',\''+pid+'\',\''+key+'\','+i+','+fi+')">✕</span></span>').join('');
  return '<tr>'

function setGE(kind,pid,key,i,f,v){const o=gateObj(kind,pid);if(!o)return;ensureGateLists(o,[key]);const e=o.gateExit[key][i];
 if(f==='owner'&&v&&v!==e.owner)notifyAssigned(v,e.t,key+' Exit Criterion — '+o.name,o.name,'');
 e[f]=v;saveState();render();}
function toggleGE(kind,pid,key,i,c){const o=gateObj(kind,pid);if(!o)return;ensureGateLists(o,[key]);o.gateExit[key][i].met=!!c;saveState();render();}
function setGD(kind,pid,key,i,f,v){const o=gateObj(kind,pid);if(!o)return;ensureGateLists(o,[key]);const d=o.gateDeliv[key][i];
 if(f==='owner'&&v&&v!==d.owner)notifyAssigned(v,d.d,key+' Deliverable — '+o.name,o.name,'');
 d[f]=v;saveState();render();}
function toggleGD(kind,pid,key,i){const o=gateObj(kind,pid);if(!o)return;ensureGateLists(o,[key]);const d=o.gateDeliv[key][i];d.avail=!d.avail;saveState();render();}
function pocGatePanel(p,key,label){ensureGateLists(p,[key]);

async function saveDelivFile(kind,pid,key,i){const d=delivItem(kind,pid,key,i);if(!d)return;if(!d.files)d.files=[];
 let rec;try{rec=await readAttachInputsAndUpload({module:'gate-deliverable',refId:kind+':'+pid+':'+key+':'+i});}catch(e){toast(e.message||'Upload failed','error');return;}
 if(!rec){toast('Choose a file or enter a link');return;}
 d.files.push(rec);toast(rec.id?'Uploaded':'Reference saved','success');
 saveState();closeModal();render();}
function openDelivFile(kind,pid,key,i,fi){const d=delivItem(kind,pid,key,i);if(!d)return;const fl=(d.files||[])[fi];if(!fl)return;
 if(fl.id)window.open(attachmentUrl(fl.id),'_blank');
 else if(fl.link)window.open(fl.link,'_blank');
 else toast('No file or link recorded');}
function delDelivFile(kind,pid,key,i,fi){const d=delivItem(kind,pid,key,i);if(!d)return;const fl=d.files[fi];if(fl&&fl.id)deleteAttachmentRemote(fl.id);d.files.splice(fi,1);saveState();render();}

// Every "attach a file" button uploads directly to the backend, which stores the bytes in S3
// and keeps a pointer row in Postgres. No local folder, no browser-specific APIs — works anywhere.
async function uploadAttachment(file,meta){
 const fd=new FormData();fd.append('file',file);
 if(meta&&meta.module)fd.append('module',meta.module);
 if(meta&&meta.refId)fd.append('refId',meta.refId);
 fd.append('uploadedBy',(CURRENT_USER&&(CURRENT_USER.name||CURRENT_USER.user))||'');
 const res=await fetch(dbApiBase+'/attachments',{method:'POST',body:fd});
 if(!res.ok){let msg='Upload failed';try{msg=(await res.json()).error||msg;}catch(e){}throw new Error(msg);}
 return res.json(); // {id,name,mimeType,size,createdAt}
}
function attachmentUrl(id){return dbApiBase+'/attachments/'+id;}
function deleteAttachmentRemote(id){if(!id)return;fetch(dbApiBase+'/attachments/'+id,{method:'DELETE'}).catch(()=>{});}
function attachModalBody(namePh){
 return '<div class="fl"><label>Choose file</label><input type="file" id="cf-file"></div>'
  +'<div class="fl"><label>Title (optional)</label><input id="cf-name" placeholder="'+(namePh||'Defaults to the file name')+'"></div>'
  +'<div class="dm-note" style="margin:6px 0">— or just record a reference / link —</div>'
  +'<div class="fl"><label>Link or location (optional)</label><input id="cf-link" placeholder="SharePoint link or URL"></div>';
}
async function readAttachInputsAndUpload(meta){
 const fileInput=$('cf-file');const f=fileInput&&fileInput.files&&fileInput.files[0];
 const title=($('cf-name')&&$('cf-name').value.trim())||'';const link=($('cf-link')&&$('cf-link').value.trim())||'';
 if(f){const rec=await uploadAttachment(f,meta);return {name:title||rec.name||f.name,id:rec.id,mimeType:rec.mimeType,size:rec.size};}
 if(title||link)return {name:title||link,link};
 return null;
}

// ════════════════════ DATABASE SYNC (production — always connected) ════════════════════
// The app persists to the AIPL Postgres database via the Node.js API. There is no manual
// "connect" step — the API address is fixed below. localStorage is kept as an instant local
// cache only — so the UI never sits blank while a network round-trip is in flight, and the app
// keeps working (read-only from last-known-good data) if the API is briefly unreachable.
const DB_STATE_KEY='projexa-main';
const PROD_API_BASE='https://atomberg-projexa-backend-service.onrender.com/api'; // ← the one line to change if the backend ever moves
let dbApiBase=PROD_API_BASE;
let dbConnState='checking'; // checking | connected | saving | offline — no manual UI, purely internal bookkeeping
let dbLastSavedAt=null;
let _dbSyncTimer=null;

async function dbFetch(path,opts){const res=await fetch(dbApiBase+path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));return res;}
// Fire-and-forget: tells the backend to email someone the moment they're assigned an item.
// Never blocks the UI and never throws — if the backend/network isn't there yet, it just no-ops.
function notifyAssigned(ownerName,itemTitle,moduleLabel,project,dueDate){
 if(!ownerName)return;
 const u=users.find(x=>x.name===ownerName||x.user===ownerName);
 if(!u||!u.email)return; // no email on file for this person — nothing we can do yet
 dbFetch('/notify/task-assigned',{method:'POST',body:JSON.stringify({
   ownerEmail:u.email,ownerName,itemTitle,module:moduleLabel,project:project||'',dueDate:dueDate||'',
   assignedBy:(CURRENT_USER&&(CURRENT_USER.name||CURRENT_USER.user))||'',link:location.origin+location.pathname
 })}).catch(()=>{});
}

// True while the user is actively in a text field — used to avoid ever pulling in a
// remote refresh (or re-rendering) mid-keystroke, which is what was cutting off typing.
function isTypingNow(){
 const el=document.activeElement;
 return !!(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable));
}
async function loadFromDb(silent){
 dbConnState='checking';
 try{
  const res=await dbFetch('/app-state/'+DB_STATE_KEY);
  if(res.status===404){dbConnState='connected';dbLastSavedAt=null;return false;} // DB reachable, nothing saved yet
  if(!res.ok)throw new Error('http '+res.status);
  const row=await res.json();
  if(row.updatedAt===dbLastSavedAt){dbConnState='connected';return false;} // nothing new — no-op, don't touch the DOM
  applyState(row.data);
  try{localStorage.setItem(KEY,JSON.stringify(collectState()));}catch(e){}
  dbLastSavedAt=row.updatedAt;dbConnState='connected';
  if(!silent)render();
  return true;
 }catch(e){dbConnState='offline';return false;}
}
async function saveToDb(force){
 try{
  const res=await dbFetch('/app-state/'+DB_STATE_KEY,{method:'PUT',body:JSON.stringify({data:collectState(),updatedBy:(CURRENT_USER&&(CURRENT_USER.name||CURRENT_USER.user))||'',expectedUpdatedAt:force?null:dbLastSavedAt})});
  if(res.status===409){
   // Someone else saved first. Never yank the DOM while a field is focused — that's what was
   // cutting off mid-keystroke typing. Just push our copy through as the new latest instead;
   // the periodic background poll (below) is what keeps everyone's screens converging.
   const res2=await dbFetch('/app-state/'+DB_STATE_KEY,{method:'PUT',body:JSON.stringify({data:collectState(),updatedBy:(CURRENT_USER&&(CURRENT_USER.name||CURRENT_USER.user))||'',expectedUpdatedAt:null})});
   if(res2.ok){const row=await res2.json();dbLastSavedAt=row.updatedAt;dbConnState='connected';}
   return;
  }
  if(!res.ok)throw new Error('http '+res.status);
  const row=await res.json();dbLastSavedAt=row.updatedAt;dbConnState='connected';
 }catch(e){dbConnState='offline';}
}
function scheduleDbSync(){clearTimeout(_dbSyncTimer);dbConnState='saving';_dbSyncTimer=setTimeout(()=>saveToDb(false),1200);}
// Keeps everyone's screen live without anyone having to refresh: polls for teammates' changes
// every few seconds, but only applies/re-renders them when the user isn't mid-typing, so it
// can never interrupt an in-progress edit. If typing, it just tries again on the next tick.
setInterval(()=>{
 if(isTypingNow())return;
 loadFromDb(true).then(changed=>{if(changed){render();toast('Updated with the latest changes from your team','info');}});
},4000);

function matchQ(hay,q){if(!q)return true;const words=q.toLowerCase().trim().split(/\s+/).filter(Boolean);if(!words.length)return true;hay=(hay==null?'':String(hay)).toLowerCase();return words.every(w=>hay.includes(w));}

// ════════════════════════════ STAT TILE ════════════════════════════
function tile(o){
 // o: {ico, color, tint, val, lbl, cap, barPct, barColor, pills, hl}
 let extra='';
 if(o.barPct!=null)extra='<div class="bar"><i style="width:'+o.barPct+'%;background:'+(o.barColor||o.color)+'"></i></div>';
 if(o.pills)extra=o.pills;
 const ring=o.ring?'<div class="ring" style="background:'+o.tint+';color:'+o.color+'">'+o.val+'</div>':'';
 return '<div class="stat'+(o.hl?' hl':'')+'"'+(o.color&&o.hl?' style="border-color:'+o.color+'"':'')+'>'
  +'<div class="top"><div><div class="lbl">'+o.lbl+'</div>'+(o.ring?'':'<div class="val">'+o.val+'</div>')+'</div>'
  +(o.ring?ring:'<div class="ico" style="background:'+o.tint+';color:'+o.color+'">'+svg(I[o.ico])+'</div>')+'</div>'
  +(o.cap?'<div class="cap">'+o.cap+'</div>':'')+extra+'</div>';
}

function pipelineWidget(){

   {k:'won',c:'#059669',lab:'Won',f:r=>r.stage==='won'},
   {k:'lost',c:'#db2777',lab:'Lost',f:r=>r.stage==='lost'}];
 const counts=seg.map(s=>rfqs.filter(s.f).length);
 const tot=counts.reduce((a,b)=>a+b,0)||1;
 const bar='<div class="pipebar">'+seg.map((s,i)=>counts[i]?'<span style="width:'+(counts[i]/tot*100)+'%;background:'+s.c+'"></span>':'').join('')+'</div>';
 const leg='<div class="pipelegend">'+seg.map((s,i)=>'<div class="lg"><span class="dot" style="background:'+s.c+'"></span>'+s.lab+': <b>'+counts[i]+'</b></div>').join('')+'</div>';
 return bar+leg;
}
// ── Executive Gantt + chart helpers ──
let ganttScope='all';
function setGantt(s){ganttScope=s;render();}
function segColor(st){return st==='Done'?'#059669':st==='In Progress'?'#2563eb':(st==='Delayed'||st==='Behind Schedule')?'#dc2626':st==='At Risk'?'#ea580c':'#cbd5e1';}
function healthColor(st){return st==='On Track'?'#059669':st==='At Risk'?'#ea580c':st==='Delayed'?'#dc2626':st==='Pre-KO'?'#94a3b8':'#7c3aed';}
function portfolioGantt(){
 const today=new Date();today.setHours(0,0,0,0);const rows=[];
 if(ganttScope==='all'||ganttScope==='npd'){npds.forEach(p=>{initNpd(p);ensureTaskPlan(p);const sc=npdSchedule(p);
   if(sc){const segs=sc.gates.map(g=>({s:g.start,e:g.end,color:segColor(g.status),title:g.g+' '+g.name+' · '+g.pct+'%'}));
     rows.push({name:p.name,sub:p.cust+' · '+GATE_LABELS[p.gate],start:sc.ko,end:sc.launch,pct:npdPct(p),health:npdHealth(p).status,segs,nav:"sub='"+p.id+"';route='npd';npdTab='gate';render()"});}
   else rows.push({name:p.name,sub:p.cust+' · KO pending',start:null,end:null,pct:0,health:'Pre-KO',segs:[],nav:"sub='"+p.id+"';route='npd';render()"});});}
 if(ganttScope==='all'||ganttScope==='poc'){pocs.filter(p=>!p.promotedTo).forEach(p=>{pocInit(p);const ts=pocActiveTasks(p).filter(t=>t.planStart&&t.planEnd);
   if(ts.length){const start=new Date(Math.min.apply(null,ts.map(t=>+new Date(t.planStart))));const end=new Date(Math.max.apply(null,ts.map(t=>+new Date(t.planEnd))));
     const segs=[];POC_STAGE_LABELS.forEach((lbl,si)=>{if(p.skip&&p.skip[si])return;const st=p.tasks.filter(t=>t.stage===si&&t.planStart&&t.planEnd);if(!st.length)return;const ss=new Date(Math.min.apply(null,st.map(t=>+new Date(t.planStart))));const se=new Date(Math.max.apply(null,st.map(t=>+new Date(t.planEnd))));const sp=pocStagePct(p,si);const status=sp===100?'Done':(si===p.stage?'In Progress':(se<today&&sp<100?'Delayed':(si<p.stage?'Done':'Upcoming')));segs.push({s:ss,e:se,color:segColor(status),title:lbl+' · '+sp+'%'});});
     rows.push({name:p.name,sub:'POC · '+POC_STAGE_LABELS[p.stage],start,end,pct:pocPct(p),health:'POC',segs,nav:"sub='"+p.id+"';route='poc';pocTab='gate';render()"});}});}
 if(!rows.length)return '<div class="gantt"><div class="gantt-empty">No scheduled projects yet. Conduct kickoff on an NPD program or add POC stage dates to populate the timeline.</div></div>';
 let mn=null,mx=null;rows.forEach(r=>{if(r.start&&(!mn||r.start<mn))mn=r.start;if(r.end&&(!mx||r.end>mx))mx=r.end;});
 if(!mn)mn=new Date(today);if(!mx)mx=addDays(new Date(today),120);
 if(today<mn)mn=new Date(today);if(today>mx)mx=new Date(today);
 mn=new Date(mn.getFullYear(),mn.getMonth(),1);mx=new Date(mx.getFullYear(),mx.getMonth()+1,0);
 const span=(mx-mn)||1;const pctL=d=>((d-mn)/span*100);
 let months='';let cur=new Date(mn.getFullYear(),mn.getMonth(),1);
 while(cur<=mx){const next=new Date(cur.getFullYear(),cur.getMonth()+1,1);months+='<div class="gantt-mo" style="left:'+pctL(cur)+'%;width:'+((Math.min(next,mx)-cur)/span*100)+'%">'+cur.toLocaleDateString('en-IN',{month:'short',year:'2-digit'})+'</div>';cur=next;}
 let gl='';{let c=new Date(mn.getFullYear(),mn.getMonth(),1);while(c<=mx){gl+='<i style="left:'+pctL(c)+'%"></i>';c=new Date(c.getFullYear(),c.getMonth()+1,1);}}
 const grid='<div class="gantt-grid">'+gl+'</div>';
 const todayLine=(today>=mn&&today<=mx)?'<div class="gtoday" style="left:'+pctL(today)+'%"><b>Today</b></div>':'';
 const rowsHtml=rows.map(r=>{let bar='';
   if(r.start&&r.end){const bl=pctL(r.start),bw=Math.max(1,pctL(r.end)-bl);let segHtml='';
     if(r.segs.length){const ss=(r.end-r.start)||1;r.segs.forEach(s=>{segHtml+='<div class="gseg" style="width:'+Math.max(0,(s.e-s.s)/ss*100)+'%;background:'+s.color+'" title="'+esc(s.title)+'"></div>';});}
     else segHtml='<div class="gseg" style="width:100%;background:'+healthColor(r.health)+'"></div>';
     bar='<div class="gbar" style="left:'+bl+'%;width:'+bw+'%">'+segHtml+'</div><div class="gbar-lbl" style="left:calc('+(bl+bw)+'% + 6px)">'+r.pct+'%</div>';}
   else bar='<div class="gbar-lbl" style="left:8px;color:var(--t3)">KO pending</div>';
   return '<div class="gantt-row"><div class="grl" onclick="'+r.nav+'"><div class="grl-name"><span class="gdot" style="background:'+healthColor(r.health)+'"></span>'+esc(r.name)+'</div><div class="grl-sub">'+esc(r.sub)+'</div></div><div class="grt">'+grid+todayLine+bar+'</div></div>';}).join('');
 const tabs='<div class="gtab"><button class="'+(ganttScope==='all'?'on':'')+'" onclick="setGantt(\'all\')">All</button><button class="'+(ganttScope==='npd'?'on':'')+'" onclick="setGantt(\'npd\')">NPD</button><button class="'+(ganttScope==='poc'?'on':'')+'" onclick="setGantt(\'poc\')">POC</button></div>';
 const legend='<div class="gantt-legend"><span><i style="background:#059669"></i>Done</span><span><i style="background:#2563eb"></i>In Progress</span><span><i style="background:#dc2626"></i>Delayed</span><span><i style="background:#cbd5e1"></i>Upcoming</span><span style="margin-left:auto;color:var(--t3)">Bar = KO→SOP timeline · segments = gates/stages · click to open</span></div>';
 return tabs+'<div class="gantt" style="margin-top:10px"><div class="gantt-scroll"><div class="gantt-inner"><div class="gantt-head"><div class="gh-l">Project</div><div class="gantt-months">'+months+'</div></div>'+rowsHtml+'</div></div>'+legend+'</div>';
}

function npdHealth(p){
 const actual=npdPct(p);
 if(!p.koDone||!p.gatePlan||!p.gatePlan.length)return {actual,expected:0,behind:0,risk:0,status:'Pre-KO'};
 const start=new Date(p.gatePlan[0].planStart),end=new Date(p.gatePlan[p.gatePlan.length-1].planEnd);
 const today=new Date();today.setHours(0,0,0,0);
 let expected=0;const span=end-start;if(span>0)expected=Math.round(Math.min(1,Math.max(0,(today-start)/span))*100);
 const risk=p.gatePlan.filter(g=>g.status==='Delayed'||g.status==='Behind Schedule'||g.status==='At Risk').length;
 const behind=Math.max(0,expected-actual);
 let status='On Track';if(risk>0||behind>12)status='Delayed';else if(behind>5)status='At Risk';
 return {actual,expected,behind,risk,status};
}

function uploadBom(proj){const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
 inp.onchange=function(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();
   rd.onload=function(ev){try{
     let rows;
     if(/\.csv$/i.test(f.name)){rows=bomCsvRows(ev.target.result);}
     else if(window.XLSX){const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});}
     else {toast('Excel parsing needs internet (SheetJS). Use the CSV template offline.','info');return;}

 };inp.click();}
function bomCsvRows(text){return text.split(/\r?\n/).filter(l=>l.trim()).map(function(l){const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){if(q&&l[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out;});}
function bomImportRows(rows,proj){if(!rows||!rows.length){toast('Empty file');return;}
 let hi=rows.findIndex(r=>r&&r.some(c=>/part desc/i.test(String(c||''))));if(hi<0)hi=0;
 const hdr=rows[hi].map(h=>String(h||'').toLowerCase().trim());
 const find=keys=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
 const C={pno:find(['part no']),desc:find(['part desc','description']),ost:find(['overall','part status']),qty:find(['quantity','qty']),common:find(['common','new part']),type:find(['dev /','dev/','dev / bo','bo / assy','assy']),mech:find(['mechanical']),src:find(['sourcing']),vd:find(['vd','vendor dev']),com:find(['commodity']),mfg:find(['manufacturing','process']),vol:find(['volume']),tm:find(['tool maker']),pm:find(['part maker']),fpa:find(['fpa status'])};
 if(C.desc<0){toast('No "Part description" column found');return;}
 const normT=t=>{t=(t||'').toLowerCase();return (t.includes('assy')||t.includes('assembl'))?'Assy':t==='bo'?'BO':'Dev';};
 const normC=c=>{c=(c||'').toLowerCase();return c.includes('ecn')?'ECN':c.includes('old')?'Old':c.includes('new')?'New':'';};
 let added=0;
 for(let r=hi+1;r<rows.length;r++){const row=rows[r];if(!row||!String(row[C.desc]||'').trim())continue;
   const g=i=>i>=0?String(row[i]||'').trim():'';
   const b={id:bomIdCtr++,cat:'TPW',proj,pno:g(C.pno),desc:g(C.desc),ost:g(C.ost),qty:g(C.qty),common:normC(g(C.common)),type:normT(g(C.type)),mechLead:g(C.mech),sourcing:g(C.src),vd:g(C.vd),commodity:g(C.com),mfgProcess:g(C.mfg),volumes:g(C.vol),toolMaker:g(C.tm),partMaker:g(C.pm),fpaStatus:g(C.fpa),fpaNumber:'',cavity:'',tonnage:'',machineMake:'',cycleTime:'',ms:{}};
   ensureBomRow(b);bomParts.push(b);added++;}
 saveState();render();toast(added+' parts imported from '+(proj||'file'),'success');}

function bomDonut(segs,total,label){const r=52,c=2*Math.PI*r;let off=0;const t=total||segs.reduce((a,s)=>a+s[1],0)||1;

let pocTab='ov';

const POC_SORT_FN={
 'Name (A-Z)':(a,b)=>(a.name||'').localeCompare(b.name||''),
 'Customer (A-Z)':(a,b)=>(a.cust||'').localeCompare(b.cust||''),
 'Owner (A-Z)':(a,b)=>(a.owner||'').localeCompare(b.owner||''),
 'Progress % (High-Low)':(a,b)=>pocPct(b)-pocPct(a),
 'Stage':(a,b)=>(a.stage||0)-(b.stage||0)
};
function pocInit(p){if(!p.skip)p.skip={};if(!p.charter)p.charter={};if(!p.parts)p.parts=[];if(!p.charter.files)p.charter.files={problem:[],specs:[],business:[]};
 if(!Array.isArray(p.charter.extraTeam))p.charter.extraTeam=[];
 if(!p.tasks){p.tasks=[];let prev='';POC_GATES.forEach((g,si)=>g.t.forEach(t=>{p.tasks.push({stage:si,n:t[0],name:t[1],dep:prev,offset:(prev?1:0),days:2,pct:0,planStart:'',planEnd:'',actualStart:'',actualEnd:'',resp:'',status:'Not Started',manualStart:false});prev=t[0];}));
   if(p.stage>0)p.tasks.forEach(t=>{if(t.stage<p.stage&&!p.skip[t.stage]){t.status='Completed';t.pct=100;}});}
 p.tasks.forEach(t=>{if(t.dep==null)t.dep='';if(t.offset==null)t.offset=0;if(t.days==null)t.days=2;if(t.pct==null)t.pct=0;if(t.remarks==null)t.remarks='';});
 if(p.koDate)recalcChain(p.tasks,p.koDate);
}
function pocActiveTasks(p){return p.tasks.filter(t=>!p.skip[t.stage]);}
function pocPct(p){pocInit(p);const ts=pocActiveTasks(p);if(!ts.length)return 0;return Math.round(ts.reduce((a,t)=>a+(+t.pct||0),0)/ts.length);}
function pocStagePct(p,si){const ts=p.tasks.filter(t=>t.stage===si);if(!ts.length)return 0;return Math.round(ts.reduce((a,t)=>a+(+t.pct||0),0)/ts.length);}
function pocStageUnlocked(p,si){if(si===0)return true;for(var k=0;k<si;k++){if(p.skip[k])continue;if(pocStagePct(p,k)<100)return false;}return true;}
function isPoc(p){return p&&typeof p.id==='string'&&p.id.indexOf('POC')===0;}
function setPocKO(id,val){const p=pocs.find(x=>x.id===id);if(!p)return;p.koDate=val;pocInit(p);recalcChain(p.tasks,p.koDate);saveState();render();}
function setPocTask(id,idx,field,val){const p=pocs.find(x=>x.id===id);if(!p)return;const t=p.tasks[idx];if(!t)return;
 if(field==='resp'&&val&&val!==t.resp)notifyAssigned(val,t.name,'POC Task — '+p.name,p.name,t.planEnd);
 if(field==='days'){t.days=Math.max(0,parseInt(val)||0);if(t.planStart)t.planEnd=addDaysIso(t.planStart,t.days);}
 else if(field==='planStart'){t.planStart=val;t.manualStart=!t.dep;if(val)t.planEnd=addDaysIso(val,t.days);}
 else if(field==='planEnd'){t.planEnd=val;if(t.planStart&&val)t.days=Math.max(0,daysBetweenIso(t.planStart,val));}
 else if(field==='dep'){t.dep=val;if(val)t.manualStart=false;}
 else if(field==='offset'){t.offset=parseInt(val)||0;}
 else if(field==='pct'){t.pct=Math.max(0,Math.min(100,parseInt(val)||0));if(t.pct===100&&t.status.indexOf('Completed')!==0)t.status=(t.planEnd&&t.actualEnd&&new Date(t.actualEnd)>new Date(t.planEnd))?'Completed After Delay':'Completed';else if(t.pct>0&&t.pct<100&&t.status==='Not Started')t.status='On Track';}
 else t[field]=val;
 if(field==='actualStart'&&val&&t.status==='Not Started')t.status='On Track';
 if(field==='actualEnd'&&val){const late=t.planEnd&&new Date(val)>new Date(t.planEnd);t.status=late?'Completed After Delay':'Completed';t.pct=100;}
 recalcChain(p.tasks,p.koDate);saveState();render();}
function setPocSkip(id,stage,val){const p=pocs.find(x=>x.id===id);if(!p)return;p.skip[stage]=val;saveState();render();}
function gatesMissingFor(o,keys){ensureGateLists(o,keys);const miss=[];

  (o.gateExit[key]||[]).forEach(e=>{if(!e.met)miss.push({type:'Exit criterion',t:e.t});});
  (o.gateDeliv[key]||[]).forEach(d=>{if(!d.avail)miss.push({type:'Deliverable',t:d.d});});
 });
 return miss;}

 let ns=p.stage+1;while(ns<4&&p.skip[ns])ns++;p.stage=ns;p.koDone=true;saveState();toast('Advanced to '+POC_STAGE_LABELS[p.stage],'success');render();}

 npds.push(np);initNpd(np);np.charter=np.charter||{};np.charter.type='NPD';if(p.charter&&p.charter.problem)np.charter.objective=p.charter.problem;
 p.promotedTo=nid;p.stage=4;p.tasks.filter(t=>t.stage===4).forEach(t=>t.status='Completed');

const MOM_MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseMomHeaderDate(h,year){
 const m=String(h||'').match(/(\d{1,2})[\s\-\/]+([A-Za-z]{3,})/);
 if(!m)return null;
 const day=+m[1];const mon=MOM_MONTHS[m[2].slice(0,3).toLowerCase()];
 if(mon==null)return null;
 const d=new Date(year,mon,day);
 return isNaN(d)?null:isoOf(d);
}

function uploadReviewMom(){

 if(!yr)return;
 const year=parseInt(yr,10)||new Date().getFullYear();
 const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.xlsx,.xls';
 inp.onchange=function(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=function(e){try{let rows;
    if(/\.csv$/i.test(f.name)){rows=bomCsvRows(e.target.result);}
    else if(window.XLSX){const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});}
    else{toast('Excel parsing needs internet. Save as CSV and upload that (works offline).','info');return;}
    reviewMomImportRows(rows,year);
  }catch(err){toast('Could not read file: '+err.message);}};
  if(/\.csv$/i.test(f.name))rd.readAsText(f);else rd.readAsArrayBuffer(f);};

function reviewMomImportRows(rows,year){
 if(!rows||!rows.length){toast('Empty file');return;}
 const hdr=rows[0].map(h=>String(h||'').trim());
 const hdrLc=hdr.map(h=>h.toLowerCase());
 const find=keys=>{for(const k of keys){const i=hdrLc.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
 const cType=find(['project type']),cName=find(['project name','project']),cCust=find(['customer']);
 if(cName<0){toast('Could not find a "Project Name" column');return;}
 const fixedIdx=new Set([cType,cName,cCust,find(['electrical']),find(['mechanical']),find(['ped'])].filter(i=>i>=0));
 const dateCols=[];hdr.forEach((h,i)=>{if(fixedIdx.has(i))return;const iso=parseMomHeaderDate(h,year);if(iso)dateCols.push({i,iso});});
 if(!dateCols.length){toast('No weekly MOM date columns recognized (expected headers like "Weekly MOM- 03 July")');return;}
 // NOTE: Weekly Review's project list always comes from the current, active NPD/POC set —
 // never from imported history. A name in old MOM data that isn't an active project today
 // (closed/historical) is skipped here on purpose; we import its notes nowhere, since there's
 // no active project row for them to attach to. This holds for this one-time import and for
 // every future import, so the MOM Matrix never grows phantom "projects" from old paperwork.
 let notesAdded=0,skippedHistoric=0,reviewsTouched=0;const skippedNames=new Set();
 dateCols.forEach(dc=>{
  let rv=reviews.find(r=>r.date===dc.iso);
  if(!rv){rv={id:reviewCtr++,date:dc.iso,attendees:'',notes:{}};reviews.push(rv);}
  reviewsTouched++;
  for(let r=1;r<rows.length;r++){
   const row=rows[r];if(!row)continue;
   const name=String(row[cName]||'').trim();if(!name)continue;
   const note=String(row[dc.i]||'').trim();if(!note)continue;
   const key=name.toLowerCase();
   const exists=npds.some(n=>n.name.toLowerCase()===key)||pocs.some(p=>p.name.toLowerCase()===key);
   if(!exists){skippedHistoric++;skippedNames.add(name);continue;}
   rv.notes[name]=note;notesAdded++;
  }
 });
 saveState();render();
 toast(reviewsTouched+' review date(s), '+notesAdded+' notes imported'+(skippedHistoric?', '+skippedNames.size+' historical project name(s) skipped (not in current NPD/POC list)':''),'success');}
